// ── Split mode ─────────────────────────────────────────────────
function redistributeBars(axis) {
    const { fpTop, fpBottom, fpLeft, fpRight, innerW, innerH } = getInnerDims();
    const isH       = axis === 'h';
    const innerSize = isH ? innerH : innerW;
    const fpNear    = isH ? fpTop   : fpLeft;
    const fpFar     = isH ? fpBottom : fpRight;

    const fullBars = state.dividers
        .filter(d => d.type === axis &&
            Math.abs(d.start) < 1 &&
            Math.abs(d.end - (isH ? innerW : innerH)) < 1)
        .sort((a,b) => a.pos - b.pos);

    const n = fullBars.length + 1; // number of rows/cols
    if (n < 2) return;

    // Calculate new bar positions
    const newPositions = [];
    const useGlassMode = isH ? equalTransomGlass : equalGlass;
    if (useGlassMode) {
        // ── Equal glass — opener-aware ────────────────────────────────────────
        // Each pane's visible glass = cellSize - inset*2, where inset depends on
        // whether the pane is an opener:
        //   fixed pane:  inset = SASH_BORDER_PX (just the cell bevel)
        //   open pane:   inset = getSashGlassInset() (bevel + full sash face)
        // Both functions use the current profile mm/SCALE_FACTOR so they adapt
        // automatically to slim/standard sash and standard/large frame profiles.
        //
        // For each column (v axis) or row (h axis), we check if ANY pane in that
        // segment is an opener — if so, the whole segment uses the open inset.
        //
        // Formula:
        //   G = (innerSize - totalBarPx - sum(inset[i]*2)) / n
        //   cellSize[i] = G + inset[i]*2
        //   barPos[i]   = sum of cellSizes[0..i] + sum of barThicknesses[0..i-1]

        const totalBarPx = fullBars.reduce((s, d) => s + (d.thicknessPx ?? MIDRAIL_FLAT_PX), 0);

        // Build inset per segment (0..n-1)
        // Segments are the spaces between bars (and between bars and frame edges)
        // For v axis: segment i covers x-range from bar[i-1] right edge to bar[i] left edge
        // We find which panes fall in each segment by checking their x position
        const fixedInset = SASH_BORDER_PX;
        const openInset  = getSashGlassInset();

        // Sort unique x positions (v) or y positions (h) to identify segment boundaries
        const segInsets = [];
        if (isH) {
            // Rows — check each horizontal segment for openers
            // Segment i is the row between bar[i-1] bottom and bar[i] top
            // We identify rows by sorted unique y values of panes
            const rowYs = [...new Set(state.panes.map(p => p.y))].sort((a,b) => a-b);
            for (let i = 0; i < n; i++) {
                const rowY = rowYs[i];
                const hasOpener = state.panes.some(p => p.y === rowY && p.opener);
                segInsets.push(hasOpener ? openInset : fixedInset);
            }
        } else {
            // Columns — check each vertical segment for openers
            const colXs = [...new Set(state.panes.map(p => p.x))].sort((a,b) => a-b);
            for (let i = 0; i < n; i++) {
                const colX = colXs[i];
                const hasOpener = state.panes.some(p => p.x === colX && p.opener);
                segInsets.push(hasOpener ? openInset : fixedInset);
            }
        }

        // Target glass size G — same for every segment
        const totalInsets = segInsets.reduce((s, inset) => s + inset * 2, 0);
        const G = (innerSize - totalBarPx - totalInsets) / n;

        // Cell sizes: G + inset[i]*2 for each segment
        const cellSizes = segInsets.map(inset => G + inset * 2);

        // Bar positions: cumulative sum of cell sizes + bar thicknesses
        let cumPos = 0;
        for (let i = 0; i < fullBars.length; i++) {
            cumPos += cellSizes[i];
            newPositions.push(cumPos);  // bar left/top edge
            cumPos += fullBars[i].thicknessPx ?? MIDRAIL_FLAT_PX;
        }
    } else {
        // Equal casement: centre-to-centre spacing divides total frame width equally
        const totalPx = fpNear + innerSize + fpFar;
        for (let i = 0; i < fullBars.length; i++) {
            const tpx = fullBars[i].thicknessPx ?? (MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2);
            const centrePx = totalPx * (i + 1) / n;
            newPositions.push(centrePx - fpNear - tpx / 2);
        }
    }

    // Apply new positions with full sync (same logic as handleMeasurementInput)
    fullBars.forEach((divider, i) => {
        const oldPos = divider.pos;
        divider.pos  = newPositions[i];
        const BAR    = divider.thicknessPx ?? (divider.type === 'h' ? MIDRAIL_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2 : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2);
        const T      = 5;
        // Sync perpendicular bar spans and pane edges
        syncDividerMove(divider, oldPos, BAR);
    });
}

function isEqualised(mode) {
    const { fpTop, fpBottom, fpLeft, fpRight, innerW, innerH } = getInnerDims();
    const TOLERANCE = 2; // px tolerance for floating point drift
    for (const axis of ['h', 'v']) {
        const innerSize = axis === 'h' ? innerH : innerW;
        const fpNear    = axis === 'h' ? fpTop   : fpLeft;
        const fpFar     = axis === 'h' ? fpBottom : fpRight;
        const fullBars = state.dividers
            .filter(d => d.type === axis && (axis === 'h' ? (d.start <= 1 && d.end >= innerW - 1) : (d.start <= 1 && d.end >= innerH - 1)))
            .sort((a, b) => a.pos - b.pos);
        const n = fullBars.length + 1;
        if (n < 2) continue;
        if (mode === 'glass') {
            const totalBarPx = fullBars.reduce((s, d) => s + (d.thicknessPx ?? MIDRAIL_FLAT_PX), 0);
            const fixedInset = SASH_BORDER_PX;
            const openInset  = getSashGlassInset();
            const segInsets  = [];
            if (axis === 'h') {
                const rowYs = [...new Set(state.panes.map(p => p.y))].sort((a,b) => a-b);
                for (let i = 0; i < n; i++) {
                    const hasOpener = state.panes.some(p => p.y === rowYs[i] && p.opener);
                    segInsets.push(hasOpener ? openInset : fixedInset);
                }
            } else {
                const colXs = [...new Set(state.panes.map(p => p.x))].sort((a,b) => a-b);
                for (let i = 0; i < n; i++) {
                    const hasOpener = state.panes.some(p => p.x === colXs[i] && p.opener);
                    segInsets.push(hasOpener ? openInset : fixedInset);
                }
            }
            const totalInsets = segInsets.reduce((s, inset) => s + inset * 2, 0);
            const G           = (innerSize - totalBarPx - totalInsets) / n;
            const cellSizes   = segInsets.map(inset => G + inset * 2);
            let cumPos = 0;
            for (let i = 0; i < fullBars.length; i++) {
                const expected = cumPos + cellSizes[i];
                if (Math.abs(fullBars[i].pos - expected) > TOLERANCE) return false;
                cumPos += cellSizes[i] + (fullBars[i].thicknessPx ?? MIDRAIL_FLAT_PX);
            }
        } else {
            const totalPx = fpNear + innerSize + fpFar;
            for (let i = 0; i < fullBars.length; i++) {
                const tpx      = fullBars[i].thicknessPx ?? MIDRAIL_FLAT_PX;
                const expected = totalPx * (i + 1) / n - fpNear - tpx / 2;
                if (Math.abs(fullBars[i].pos - expected) > TOLERANCE) return false;
            }
        }
    }
    return true;
}

function updateEqualiseButtons() {
    const btnC = el('dc-split-casement');
    const btnG = el('dc-split-glass');
    const hasBars    = state.dividers.some(d => d.type === 'h' || d.type === 'v');
    const isCasement = hasBars && isEqualised('casement');
    const isGlass    = hasBars && isEqualised('glass') && !isCasement;
    if (btnC) btnC.classList.toggle('active', isCasement);
    if (btnG) btnG.classList.toggle('active', isGlass);
}

// Sends syncEqualise to console — called explicitly on equalise, bar drag, and reset
function broadcastEqualiseState(equalCasement, equalGlass) {
    const payload = { source: 'product-display', command: 'syncEqualise', data: { equalCasement: !!equalCasement, equalGlass: !!equalGlass } };
    window.postMessage(payload, '*');
    try { window.parent.postMessage(payload, '*'); } catch(e) {}
}

function dcSetSplitMode(mode) {
    equalGlass = (mode === 'glass');
    // Columns only — never touches rows (h axis)
    redistributeBars('v');
    render();
    broadcastEqualiseState(mode === 'casement', mode === 'glass');
}

function broadcastTransomEqualiseState(equalTransomCasement, equalTransomGlass) {
    const payload = { source: 'product-display', command: 'syncTransomEqualise', data: { equalTransomCasement: !!equalTransomCasement, equalTransomGlass: !!equalTransomGlass } };
    window.postMessage(payload, '*');
    try { window.parent.postMessage(payload, '*'); } catch(e) {}
}

function dcSetTransomMode(mode) {
    equalTransomGlass = (mode === 'glass');
    // Rows only — never touches columns (v axis)
    redistributeBars('h');
    render();
    broadcastTransomEqualiseState(mode === 'casement', mode === 'glass');
}

function dcSetAddon(side, idx, mm) {
    // Lock-aware resize: locked dividers keep their pos, only unlocked ones scale.
    const { innerW: oldInnerW, innerH: oldInnerH } = getInnerDims();
    const s = side === 'bttm' ? 'bottom' : side;
    addonState[s][idx] = parseInt(mm) || 0;
    const { innerW: newInnerW, innerH: newInnerH } = getInnerDims();
    const scaleX = oldInnerW > 0 ? newInnerW / oldInnerW : 1;
    const scaleY = oldInnerH > 0 ? newInnerH / oldInnerH : 1;

    const affectsY = (side === 'top' || side === 'bttm');
    const affectsX = (side === 'left' || side === 'right');

    // fullSpanH[i] is the divider between segment i and segment i+1.
    // lockedH[i] = true means the user has manually fixed segment i's height.
    const fullSpanH = state.dividers
        .filter(d => d.type === 'h' && Math.abs(d.start) < 1)
        .sort((a, b) => a.pos - b.pos);
    const fullSpanV = state.dividers
        .filter(d => d.type === 'v' && Math.abs(d.start) < 1)
        .sort((a, b) => a.pos - b.pos);

    const _preScale = state.dividers.map(d => ({ type: d.type, pos: d.pos, thicknessPx: d.thicknessPx ?? (d.type === 'h' ? MIDRAIL_FLAT_PX : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2) }));

    // Skip d.pos scaling for any divider whose adjacent segment is locked.
    // d.start and d.end still scale normally — only pos is protected.
    state.dividers.forEach(d => {
        if (d.type === 'h') {
            if (affectsY) {
                const barIdx   = fullSpanH.indexOf(d);
                const isLocked = barIdx >= 0 && (lockedH[barIdx] || lockedH[barIdx + 1]);
                if (!isLocked) d.pos = Math.round(d.pos * scaleY);
            }
            d.start = Math.round(d.start * scaleX);
            d.end   = Math.round(d.end   * scaleX);
        } else {
            if (affectsX) {
                const barIdx   = fullSpanV.indexOf(d);
                const isLocked = barIdx >= 0 && (lockedV[barIdx] || lockedV[barIdx + 1]);
                if (!isLocked) d.pos = Math.round(d.pos * scaleX);
            }
            d.start = Math.round(d.start * scaleY);
            d.end   = Math.round(d.end   * scaleY);
        }
    });
    scalePanes(scaleX, scaleY, _preScale);
    scaleAstragalPositions(scaleX, scaleY);

    // scalePanes calculates pane edges using divider.pos * scaleY,
    // which is wrong for locked dividers that did not move.
    // This loop corrects any pane whose edge was shifted away from
    // a locked divider, snapping it back to the exact position.
    fullSpanH.forEach((d, barIdx) => {
        if (lockedH[barIdx] || lockedH[barIdx + 1]) {
            const BAR = d.thicknessPx ?? MIDRAIL_FLAT_PX;
            state.panes.forEach(p => {
                if (p.y + p.h <= d.pos + BAR && p.y + p.h >= d.pos - BAR) p.h = d.pos - p.y;
                if (p.y >= d.pos && p.y <= d.pos + BAR * 2) { p.h += p.y - (d.pos + BAR); p.y = d.pos + BAR; }
            });
        }
    });
    fullSpanV.forEach((d, barIdx) => {
        if (lockedV[barIdx] || lockedV[barIdx + 1]) {
            const BAR = d.thicknessPx ?? (MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2);
            state.panes.forEach(p => {
                if (p.x + p.w <= d.pos + BAR && p.x + p.w >= d.pos - BAR) p.w = d.pos - p.x;
                if (p.x >= d.pos && p.x <= d.pos + BAR * 2) { p.w += p.x - (d.pos + BAR); p.x = d.pos + BAR; }
            });
        }
    });

    const hint = el('dc-addon-trickle-hint');
    if (hint) hint.style.display = addonState.top.some(v => v > 0) ? 'block' : 'none';
    render();
}

function dcSetCill(mm) {
    // Lock-aware resize: locked dividers keep their pos, only unlocked ones scale.
    const { innerW: oldInnerW, innerH: oldInnerH } = getInnerDims();
    cillHeight = parseInt(mm) || 0;
    const { innerW: newInnerW, innerH: newInnerH } = getInnerDims();
    const scaleX = oldInnerW > 0 ? newInnerW / oldInnerW : 1;
    const scaleY = oldInnerH > 0 ? newInnerH / oldInnerH : 1;

    // fullSpanH[i] is the divider between segment i and segment i+1.
    // lockedH[i] = true means the user has manually fixed segment i's height.
    const fullSpanH = state.dividers
        .filter(d => d.type === 'h' && Math.abs(d.start) < 1)
        .sort((a, b) => a.pos - b.pos);

    const _preScale = state.dividers.map(d => ({ type: d.type, pos: d.pos, thicknessPx: d.thicknessPx ?? (d.type === 'h' ? MIDRAIL_FLAT_PX : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2) }));

    // Skip d.pos scaling for any divider whose adjacent segment is locked.
    // d.start and d.end still scale normally — only pos is protected.
    state.dividers.forEach(d => {
        if (d.type === 'h') {
            const barIdx   = fullSpanH.indexOf(d);
            const isLocked = barIdx >= 0 && (lockedH[barIdx] || lockedH[barIdx + 1]);
            if (!isLocked) d.pos = Math.round(d.pos * scaleY);
            d.start = Math.round(d.start * scaleX);
            d.end   = Math.round(d.end   * scaleX);
        } else {
            d.pos   = Math.round(d.pos   * scaleX);
            d.start = Math.round(d.start * scaleY);
            d.end   = Math.round(d.end   * scaleY);
        }
    });
    scalePanes(scaleX, scaleY, _preScale);
    scaleAstragalPositions(scaleX, scaleY);

    // scalePanes calculates pane edges using divider.pos * scaleY,
    // which is wrong for locked dividers that did not move.
    // This loop corrects any pane whose edge was shifted away from
    // a locked divider, snapping it back to the exact position.
    fullSpanH.forEach((d, barIdx) => {
        if (lockedH[barIdx] || lockedH[barIdx + 1]) {
            const BAR = d.thicknessPx ?? MIDRAIL_FLAT_PX;
            state.panes.forEach(p => {
                if (p.y + p.h <= d.pos + BAR && p.y + p.h >= d.pos - BAR) p.h = d.pos - p.y;
                if (p.y >= d.pos && p.y <= d.pos + BAR * 2) { p.h += p.y - (d.pos + BAR); p.y = d.pos + BAR; }
            });
        }
    });

    render();
}

function dcSetSashStyle(style) {
    sashStyle = style;
    render();
    // After render(), re-apply opener overlays with correct sash style and restore arrows
    innerEl.querySelectorAll('.cell').forEach(cellEl => {
        const existing = cellEl.querySelector('.opener-overlay');
        if (!existing) return;
        const idx = parseInt(cellEl.dataset.paneIdx);
        const savedDirection = (state.panes[idx].direction || []).slice();
        toggleOpener(cellEl);
        toggleOpener(cellEl);
        state.panes[idx].direction = savedDirection;
        if (savedDirection.length) setArrow(cellEl, savedDirection);
    });
    renderTrickleVents();
    renderAstragals();
}

function dcFullReset() {
    state.width_mm     = 1200;
    state.height_mm    = 1200;
    state.frameProfile = { top: 'standard', bottom: 'standard', left: 'standard', right: 'standard' };
    state.sashProfile  = 'slim';
    applyExternalFrameColour('#efeeee');
    colourState.internalFrame = '#efeeee';
    colourState.internalSash  = '#efeeee';
    jointState.externalFrame  = 'welded';
    jointState.externalSash   = 'welded';
    jointState.internalSash   = 'welded';
    dcSetFrameJoint('welded');
    dcSetSashJoint('welded');
    cillHeight = 0;
    addonState.top    = [0,0,0];
    addonState.bottom = [0,0,0];
    addonState.left   = [0,0,0];
    addonState.right  = [0,0,0];
    document.querySelectorAll('.addon-select').forEach(s => s.value = '0');
    const hint = el('dc-addon-trickle-hint'); if (hint) hint.style.display = 'none';
    const _cs = el('dc-cill-select'); if (_cs) _cs.value = '0';
    Object.keys(lockedH).forEach(k => delete lockedH[k]);
    Object.keys(lockedV).forEach(k => delete lockedV[k]);
    equalGlass        = false;
    equalTransomGlass = false;
    astragal.mode    = 'through';
    astragal.perSash = {};
    astragal.through = {};
    dcSetAstragalMode('through');
    sashStyle  = 'chamfered';
    const chamBtn = el('dc-sash-chamfered'); if (chamBtn) chamBtn.classList.add('active');
    const sculBtn = el('dc-sash-sculptured'); if (sculBtn) sculBtn.classList.remove('active');
    trickleVents = { inHead: {}, aboveMullion: {}, inSash: {}, addonTop: null };
    // Note: selectedPaneId reset is not needed here — init() auto-selects A1 immediately after
    // Sync console UI
    const wInput = el('dc-width');  if (wInput) wInput.value = 1200;
    const hInput = el('dc-height'); if (hInput) hInput.value = 1200;
    dcUpdateFrameProfileBtn();
    const fjW    = el('dc-fj-welded');   if (fjW)   { fjW.classList.add('active');   el('dc-fj-mech').classList.remove('active'); }
    const _sc = el('dc-split-casement'); if (_sc) _sc.classList.remove('active');
    const _sg = el('dc-split-glass'); if (_sg) _sg.classList.remove('active');
    const colExtFrame = el('dc-col-ext-frame'); if (colExtFrame) colExtFrame.value = '#efeeee';
    const colExtSash  = el('dc-col-ext-sash');  if (colExtSash)  colExtSash.value  = '#efeeee';
    init();
    broadcastEqualiseState(false, false);
    broadcastTransomEqualiseState(false, false);
    // Re-send full initial state so console syncs completely after reset
    setTimeout(casementSendInitialState, 50);
}

// ── astragalFreezeAllToPerSash ───────────────────────────────
// Called when a bar is dragged while in through mode.
// Captures the current visual % position of every bar on every pane
// and stores them as draggedH/draggedV so they stay exactly where they
// are visually when the mode switches to per-sash.
// For fixed panes:  % = i/hCount*100 (the default equal spacing)
// For open sashes:  % = the getBoundingClientRect-derived position converted to %
//                   measured live from the rendered bar itself
function astragalFreezeAllToPerSash() {
    const cells = Array.from(innerEl.querySelectorAll('.cell'));
    state.panes.forEach((p, idx) => {
        const data = astragal.perSash[idx];
        if (!data) return;
        const cellEl  = cells[idx];
        if (!cellEl) return;
        const isOpen  = !!cellEl.querySelector('.opener-overlay');
        const glassEl = isOpen ? cellEl.querySelector('.opener-glass') : null;
        const target  = glassEl || cellEl;

        if (!data.draggedH) data.draggedH = {};
        if (!data.draggedV) data.draggedV = {};

        if (isOpen && glassEl) {
            // Measure each bar's actual rendered position inside the glass
            const bars = Array.from(target.querySelectorAll('.astragal-bar.astragal-h'));
            const targetRect = target.getBoundingClientRect();
            const h = targetRect.height / currentAutoScale;
            bars.forEach((bar, bi) => {
                const barRect = bar.getBoundingClientRect();
                const centrePx = (barRect.top - targetRect.top) / currentAutoScale + (barRect.height / currentAutoScale) / 2;
                data.draggedH[bi + 1] = Math.max(0, Math.min(100, (centrePx / h) * 100));
            });
            const vBars = Array.from(target.querySelectorAll('.astragal-bar.astragal-v'));
            const w = targetRect.width / currentAutoScale;
            vBars.forEach((bar, bi) => {
                const barRect = bar.getBoundingClientRect();
                const centrePx = (barRect.left - targetRect.left) / currentAutoScale + (barRect.width / currentAutoScale) / 2;
                data.draggedV[bi + 1] = Math.max(0, Math.min(100, (centrePx / w) * 100));
            });
        } else {
            // Fixed pane — use the default equal % positions
            for (let i = 1; i < data.hCount; i++) data.draggedH[i] = (i / data.hCount) * 100;
            for (let i = 1; i < data.vCount; i++) data.draggedV[i] = (i / data.vCount) * 100;
        }
    });
}

// ── dcSetAstragalMode ────────────────────────────────────────
// Sets astragal.mode and updates the UI button state.
// IMPORTANT: 'through' and 'per-sash' are now UX-only distinctions —
// both modes store bar counts in astragal.perSash and render identically.
// The only rendering difference is in renderAstragals: when mode === 'through'
// AND the pane is an open sash, bars are positioned using getBoundingClientRect()
// so they align visually with adjacent fixed panes.
// In per-sash mode, open sash bars use % positioning like fixed panes (no alignment).
function dcSetAstragalMode(mode) {
    astragal.mode = mode;
    ['per-sash','through'].forEach(m => {
        const btn = el('dc-ast-' + m);
        if (btn) btn.classList.toggle('active', m === mode);
    });
    // Controls always visible — dropdowns default to 0 (no bars)
    const _ac = el('dc-ast-controls'); if (_ac) _ac.style.display = 'flex';
    dcUpdateAstragalUI();
    render();
}

function dcUpdateAstragalUI() {
    const hSel = el('dc-ast-h');
    const vSel = el('dc-ast-v');
    if (!hSel || !vSel) return;

    // Populate dropdowns 0–10 if not already done (0 = no bars)
    if (!hSel.options.length) {
        hSel.add(new Option('0 (none)', 0));
        vSel.add(new Option('0 (none)', 0));
        for (let i = 1; i <= 10; i++) {
            hSel.add(new Option(i, i));
            vSel.add(new Option(i, i));
        }
    }

    // Both through and per-sash show the selected pane's counts.
    // "Apply to All" pushes to all panes in either mode.
    const idx = getSelectedPaneIdx();
    if (idx === null || idx < 0) {
        hSel.value = 0;
        vSel.value = 0;
        return;
    }
    const data = astragal.perSash[idx] || { hCount: 0, vCount: 0 };
    hSel.value = data.hCount;
    vSel.value = data.vCount;
}

function dcAstragalSetH(val) {
    const count = parseInt(val);
    const idx = getSelectedPaneIdx();
    if (idx === null || idx < 0) return;
    astragalSetCount(idx, 'h', count);
}

function dcAstragalSetV(val) {
    const count = parseInt(val);
    const idx = getSelectedPaneIdx();
    if (idx === null || idx < 0) return;
    astragalSetCount(idx, 'v', count);
}

function applyFrameJoint(type) {
    jointState.externalFrame = type;
    render();  // rebuilds frame corners and bar chevrons
}

function applySashJoint(type) {
    jointState.externalSash = type;
    // Redraw corners on all existing open sashes
    applyExternalSashColour(colourState.externalSash);
}

function dcSetFrameJoint(type) {
    const wBtn = el('dc-fj-welded');
    const mBtn = el('dc-fj-mech');
    if (wBtn) wBtn.classList.toggle('active', type === 'welded');
    if (mBtn) mBtn.classList.toggle('active', type === 'mechanical');
    applyFrameJoint(type);
}

function dcSetSashJoint(type) {
    const wBtn = el('dc-sj-welded');
    const mBtn = el('dc-sj-mech');
    if (wBtn) wBtn.classList.toggle('active', type === 'welded');
    if (mBtn) mBtn.classList.toggle('active', type === 'mechanical');
    applySashJoint(type);
}

// ── postMessage handler ───────────────────────────────────────
// ── Embedded mode flag ───────────────────────────────────────
// Set to true when running inside pvc-combined-frame.
// Suppresses autoScaleProduct() so the door doesn't shrink to fit the
// tiny iframe viewport; instead a CSS transform is applied to fill it.
var pvcResiDoor_embeddedMode = false;

window.addEventListener('message', function(event) {
    const msg = event.data;
    if (!msg) return;

    // ── Combined frame embedded mode commands ─────────────────
    if (msg.source === 'combined-frame-master' || msg.source === 'bubble-control') {
        if (msg.command === 'enterEmbeddedMode') {
            console.log('🔗 resi-door: entering embedded mode');
            pvcResiDoor_embeddedMode = true;
            // Hide measurement rulers and surrounding chrome
            ['measurements-x','measurements-x-total','measurements-y','measurements-y-total'].forEach(function(id) {
                var el2 = document.getElementById(id);
                if (el2) el2.style.display = 'none';
            });
            // Remove padding from product-wrapper so door fills the iframe
            var pw = document.getElementById('product-wrapper');
            if (pw) pw.style.padding = '0';
            // Ensure product is visible
            if (pw) pw.style.visibility = 'visible';
            return;
        }
        if (msg.command === 'updateDimensions' && msg.data) {
            var d = msg.data;
            console.log('🔗 resi-door: updateDimensions', d);
            if (d.widthMm)  state.width_mm  = d.widthMm;
            if (d.heightMm) state.height_mm = d.heightMm;
            // Re-render at new size
            init();
            // After render, scale the wrapper to fill the iframe exactly
            setTimeout(function() {
                var pw = document.getElementById('product-wrapper');
                if (pw && d.overlayW && d.overlayH) {
                    pw.style.transform       = 'none';
                    pw.style.transformOrigin = 'top left';
                    var natW = pw.scrollWidth;
                    var natH = pw.scrollHeight;
                    if (natW > 0 && natH > 0) {
                        var scaleX = d.overlayW / natW;
                        var scaleY = d.overlayH / natH;
                        var scale  = Math.min(scaleX, scaleY);
                        pw.style.transform = 'scale(' + scale + ')';
                        console.log('🔗 resi-door: scale applied', scale, '(natW='+natW+' natH='+natH+' overlayW='+d.overlayW+' overlayH='+d.overlayH+')');
                    }
                }
                // Tell combined frame our rendered size so it can log/verify
                window.parent.postMessage({
                    source: 'product-display',
                    command: 'renderedSize',
                    data: { w: pw ? pw.scrollWidth : 0, h: pw ? pw.scrollHeight : 0 }
                }, '*');
            }, 100);
            return;
        }
    }

    // Bubble sends loadDefaults for new product or loadProduct for existing
    if (msg.source === 'bubble-control') {
        if (msg.command === 'loadDefaults' && msg.data) {
            loadProductData(msg.data);
        }
        if (msg.command === 'loadProduct' && msg.data) {
            loadProductData(msg.data);
        }
        return;
    }

    // Save button requests
    if (msg.source === 'save-button') {
        if (msg.command === 'getProductData') {
            window.parent.postMessage({
                source:  'product-display',
                command: 'productData',
                data:    collectProductData()
            }, '*');
        }
        if (msg.command === 'getScreenshot') {
            captureScreenshot();
        }
        return;
    }

    if (msg.source !== 'control-panel') return;
    if (msg.command === 'updateProfile') {
        if (msg.data && msg.data.profileName !== undefined) savedProfileName = msg.data.profileName;
    }
    if (msg.command === 'updateRange') {
        if (msg.data && msg.data.rangeName !== undefined) savedRangeName = msg.data.rangeName;
    }
    if (msg.command === 'updateColour') {
        if (isLoadingProduct) return;
        const { target, colour } = msg.data;
        if (!colour || !colour.hex) return;
        const hex = colour.hex.startsWith('#') ? colour.hex : '#' + colour.hex;
        colourState[target] = hex;
        colourState[target + 'Name'] = colour.colourName || colour.colourname || '';
        if (target === 'externalFrame') applyExternalFrameColour(hex);
        if (target === 'externalSash')  applyExternalSashColour(hex);
        // internalFrame and internalSash: saved to colourState only, no visual change
    }
    if (msg.command === 'updateFrameExternalCorner') {
        applyFrameJoint(msg.data.type);
    }
    if (msg.command === 'updateSashExternalCorner') {
        applySashJoint(msg.data.type);
    }
    if (msg.command === 'updateSashInternalCorner') {
        jointState.internalSash = msg.data.type;   // saved only
    }
    if (msg.command === 'updateFrameProfile') {
        const key  = msg.data.key;
        const side = msg.data.side;
        const { innerW: oldInnerW, innerH: oldInnerH } = getInnerDims();
        if (side === 'all') {
            ['top','bottom','left','right'].forEach(s => { state.frameProfile[s] = key; });
        } else {
            state.frameProfile[side] = key;
        }
        dcUpdateFrameProfileBtn();
        const { innerW: newInnerW, innerH: newInnerH } = getInnerDims();
        if (state.dividers.length > 0 || state.panes.length > 1) {
            const scaleX = oldInnerW > 0 ? newInnerW / oldInnerW : 1;
            const scaleY = oldInnerH > 0 ? newInnerH / oldInnerH : 1;
            const _preScale = state.dividers.map(d => ({ type: d.type, pos: d.pos, thicknessPx: d.thicknessPx ?? (d.type === 'h' ? MIDRAIL_FLAT_PX : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2) }));
            state.dividers.forEach(d => {
                if (d.type === 'h') { d.pos = Math.round(d.pos * scaleY); d.start = Math.round(d.start * scaleX); d.end = Math.round(d.end * scaleX); }
                else                { d.pos = Math.round(d.pos * scaleX); d.start = Math.round(d.start * scaleY); d.end = Math.round(d.end * scaleY); }
            });
            scalePanes(scaleX, scaleY, _preScale);
            render();
        } else {
            init();
        }
    }
    if (msg.command === 'updateAddon') {
        dcSetAddon(msg.data.side, msg.data.idx, msg.data.mm);
    }
    if (msg.command === 'updateAddonTopTrickle') {
        trickleVents.addonTop = msg.data.size;
        dcRebuildTrickleCards();
        renderTrickleVents();
    }
    if (msg.command === 'updateTrickleHead') {
        const idx = msg.data.colIdx;
        const size = msg.data.size;
        if (size === null) { delete trickleVents.inHead[idx]; }
        else { trickleVents.inHead[idx] = size; }
        dcRebuildTrickleCards();
        renderTrickleVents();
    }
    if (msg.command === 'updateTrickleMullion') {
        const idx = msg.data.mullionIdx;
        const size = msg.data.size;
        if (size === null) { delete trickleVents.aboveMullion[idx]; }
        else { trickleVents.aboveMullion[idx] = size; }
        dcRebuildTrickleCards();
        renderTrickleVents();
    }
    if (msg.command === 'updateAddonTopTrickle') {
        trickleVents.addonTop = msg.data.size;
        dcRebuildTrickleCards();
        renderTrickleVents();
    }
    if (msg.command === 'clearAllTrickle') {
        dcClearAllTrickle();
    }
    if (msg.command === 'updateAstragalMode') {
        dcSetAstragalMode(msg.data.mode);
    }
    if (msg.command === 'updateAstragalH') {
        dcAstragalSetH(msg.data.count);
    }
    if (msg.command === 'updateAstragalV') {
        dcAstragalSetV(msg.data.count);
    }
    if (msg.command === 'astragalApplyAll') {
        astragalApplyAll();
    }
    if (msg.command === 'updateEqualise') {
        dcSetSplitMode(msg.data.mode);
        // broadcastEqualiseState already called inside dcSetSplitMode
    }
    if (msg.command === 'updateTransomEqualise') {
        dcSetTransomMode(msg.data.mode);
    }
    if (msg.command === 'updateSashProfile') {
        dcSetSashProfile(msg.data.key);
    }
    if (msg.command === 'updateSashStyle') {
        dcSetSashStyle(msg.data.style);
    }
    if (msg.command === 'updateCillHeight') {
        // Lock-aware resize: locked dividers keep their pos, only unlocked ones scale.
        const { innerW: oldInnerW, innerH: oldInnerH } = getInnerDims();
        cillHeight = parseInt(msg.data.height) || 0;
        const { innerW: newInnerW, innerH: newInnerH } = getInnerDims();
        const scaleX = oldInnerW > 0 ? newInnerW / oldInnerW : 1;
        const scaleY = oldInnerH > 0 ? newInnerH / oldInnerH : 1;

        // fullSpanH[i] is the divider between segment i and segment i+1.
        // lockedH[i] = true means the user has manually fixed segment i's height.
        const fullSpanH = state.dividers
            .filter(d => d.type === 'h' && Math.abs(d.start) < 1)
            .sort((a, b) => a.pos - b.pos);

        const _preScale = state.dividers.map(d => ({ type: d.type, pos: d.pos, thicknessPx: d.thicknessPx ?? (d.type === 'h' ? MIDRAIL_FLAT_PX : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2) }));

        // Skip d.pos scaling for any divider whose adjacent segment is locked.
        // d.start and d.end still scale normally — only pos is protected.
        state.dividers.forEach(d => {
            if (d.type === 'h') {
                const barIdx   = fullSpanH.indexOf(d);
                const isLocked = barIdx >= 0 && (lockedH[barIdx] || lockedH[barIdx + 1]);
                if (!isLocked) d.pos = Math.round(d.pos * scaleY);
                d.start = Math.round(d.start * scaleX);
                d.end   = Math.round(d.end   * scaleX);
            } else {
                const fullSpanV = state.dividers
                    .filter(v => v.type === 'v' && Math.abs(v.start) < 1)
                    .sort((a, b) => a.pos - b.pos);
                const barIdx   = fullSpanV.indexOf(d);
                const isLocked = barIdx >= 0 && (lockedV[barIdx] || lockedV[barIdx + 1]);
                if (!isLocked) d.pos = Math.round(d.pos * scaleX);
                d.start = Math.round(d.start * scaleY);
                d.end   = Math.round(d.end   * scaleY);
            }
        });
        scalePanes(scaleX, scaleY, _preScale);
        scaleAstragalPositions(scaleX, scaleY);

        // scalePanes calculates pane edges using divider.pos * scaleY,
        // which is wrong for locked dividers that did not move.
        // This loop corrects any pane whose edge was shifted away from
        // a locked divider, snapping it back to the exact position.
        fullSpanH.forEach((d, barIdx) => {
            if (lockedH[barIdx] || lockedH[barIdx + 1]) {
                const BAR = d.thicknessPx ?? MIDRAIL_FLAT_PX;
                state.panes.forEach(p => {
                    if (p.y + p.h <= d.pos + BAR && p.y + p.h >= d.pos - BAR) p.h = d.pos - p.y;
                    if (p.y >= d.pos && p.y <= d.pos + BAR * 2) { p.h += p.y - (d.pos + BAR); p.y = d.pos + BAR; }
                });
            }
        });

        render();
    }
    if (msg.command === 'requestInitialState') {
        casementSendInitialState();
    }
    if (msg.command === 'fullReset') {
        dcFullReset();
    }
    if (msg.command === 'updateEnergyRating') {
        glassState.energyRating = msg.data.rating;
    }
    if (msg.command === 'updateGlazedType') {
        glassState.glazedType = msg.data.glazedType;
    }
    if (msg.command === 'updateGlassTypePrimary') {
        glassState.glassTypePrimary = msg.data.primary;
        glassState.glassTypeSecondary = '';
    }
    if (msg.command === 'updateGlassTypeSecondary') {
        glassState.glassTypeSecondary = msg.data.secondary;
    }
    if (msg.command === 'updatePegStay') {
        furnitureState.pegStay = msg.data.pegStay;
    }
    if (msg.command === 'updateHandleRange') {
        furnitureState.handleRange = msg.data.handleRange;
    }
    if (msg.command === 'updateHandleSub') {
        furnitureState.handleSub = msg.data.handleSub;
    }
    if (msg.command === 'updateHandleColour') {
        furnitureState.handleColour = msg.data.handleColour;
    }
    if (msg.command === 'updateHingeType') {
        otherState.hingeType = msg.data.hingeType;
    }
    if (msg.command === 'updateSpacerBar') {
        otherState.spacerBar = msg.data.spacerBar;
    }
    if (msg.command === 'updateDrainage') {
        otherState.drainage = msg.data.drainage;
    }
    if (msg.command === 'updateBeadType') {
        otherState.beadType = msg.data.beadType;
    }
    if (msg.command === 'updateCoupler') {
        if (!otherState.couplers) otherState.couplers = { top: 'None', bttm: 'None', left: 'None', right: 'None' };
        otherState.couplers[msg.data.side] = msg.data.value;
    }
});

// Sends the current product state to the console via postMessage.
// Called on load (setTimeout) and whenever requestInitialState is received.
// Uses window.parent.postMessage — same pattern as all other working products.
function casementSendInitialState() {
    const colXs = [...new Set(state.panes.map(p => p.x))].sort((a,b) => a-b);
    const rowYs = [...new Set(state.panes.map(p => p.y))].sort((a,b) => a-b);
    const payload = {
        source:  'product-display',
        command: 'initialState',
        data: {
            productType: 'pvc-casement',
            grid: {
                cols: colXs.length,
                rows: rowYs.length
            },
            cornerTypes: {
                frameExternalCorner: jointState.externalFrame,
                sashExternalCorner:  jointState.externalSash,
                sashInternalCorner:  jointState.internalSash
            },
            sashStyle:           sashStyle,
            sashProfile:         state.sashProfile,
            equalGlass:          equalGlass,
            equalTransomGlass:   equalTransomGlass,
            astragal:            astragal,
            trickleVents:        trickleVents,
            addonState:          addonState,
            frameProfile:        state.frameProfile,
            cillHeight:          cillHeight,
            glassState:          glassState,
            furnitureState:      furnitureState,
            otherState:          otherState,
            externalFrameColour: { colourName: colourState.externalFrameName },
            externalSashColour:  { colourName: colourState.externalSashName },
            internalFrameColour: { colourName: colourState.internalFrameName },
            internalSashColour:  { colourName: colourState.internalSashName },
            selectedPane: (function() {
                if (!selectedPaneId) return null;
                const idx = getSelectedPaneIdx();
                if (idx === null || idx < 0 || !state.panes[idx]) return null;
                const p = state.panes[idx];
                return {
                    paneId: selectedPaneId,
                    hCount: (astragal.perSash[idx] || {}).hCount || 0,
                    vCount: (astragal.perSash[idx] || {}).vCount || 0,
                    mode:   astragal.mode
                };
            })()
        }
    };
    console.log('📤 Casement sending initial state to console');
    // Bubble HTML elements are on the same page DOM — window.postMessage first
    window.postMessage(payload, '*');
    // Also try parent for iframe compatibility
    try { window.parent.postMessage(payload, '*'); } catch(e) {}
}

// ── Auto-scale ────────────────────────────────────────────────
// Scales #product-wrapper using CSS transform: scale() so the entire
// configurator (window + measurements + rulers) fits inside #product-scale-wrap.
// Called after every render and on viewport resize via ResizeObserver.
// SCALE_FACTOR is NOT changed — this is purely a visual zoom.
// Measurement inputs are counter-scaled so they remain a fixed readable size
// regardless of how small the configurator is scaled.
// A small padding (AUTOSCALE_PAD) keeps the window from touching the edges.
const AUTOSCALE_PAD = 40; // px padding inside the scale wrap

function autoScaleProduct() {
    if (typeof pvcResiDoor_embeddedMode !== 'undefined' && pvcResiDoor_embeddedMode) return;
    const wrap    = document.getElementById('product-scale-wrap');
    const wrapper = document.getElementById('product-wrapper');
    if (!wrap || !wrapper) return;

    // Temporarily reset transform so we can measure natural size
    wrapper.style.transform = 'scale(1)';

    const availW = wrap.clientWidth  - AUTOSCALE_PAD * 2;
    const availH = wrap.clientHeight - AUTOSCALE_PAD * 2;
    const natW   = wrapper.scrollWidth;
    const natH   = wrapper.scrollHeight;

    // Fit to the most constrained dimension, never upscale beyond 1
    const scale = Math.min(1, availW / natW, availH / natH);
    currentAutoScale = scale; // expose for mouse-coord correction

    wrapper.style.transform = `scale(${scale})`;

    // Refresh arrow stroke-widths so they stay crisp at the new scale
    const sw = (1.5 / scale).toFixed(2);
    wrapper.querySelectorAll('.arrow-svg line').forEach(line => line.setAttribute('stroke-width', sw));

    // Counter-scale all measurement inputs so they remain a fixed readable size.
    // transform-origin is set per-axis so inputs grow away from the window:
    //   y-axis (left ruler): right center — grows leftward away from window
    //   x-axis (top ruler): center bottom — grows upward away from window
    //   totals: same logic
    if (scale < 1) {
        const counterScale = 1 / scale;
        wrapper.querySelectorAll('.m-seg input').forEach(inp => {
            inp.style.transform       = `scale(${counterScale})`;
            inp.style.transformOrigin = 'right center';
        });
        wrapper.querySelectorAll('.my-total input').forEach(inp => {
            inp.style.transform       = `scale(${counterScale})`;
            inp.style.transformOrigin = 'left center';
        });
        wrapper.querySelectorAll('.mx-seg input').forEach(inp => {
            inp.style.transform       = `scale(${counterScale})`;
            inp.style.transformOrigin = 'center bottom';
        });
        wrapper.querySelectorAll('.mx-total input').forEach(inp => {
            inp.style.transform       = `scale(${counterScale})`;
            inp.style.transformOrigin = 'center center';
        });
    } else {
        wrapper.querySelectorAll('.m-seg input, .mx-seg input, .my-total input, .mx-total input').forEach(inp => {
            inp.style.transform = '';
        });
    }
}

// Re-scale whenever the wrap div changes size (browser resize etc.)
(function() {
    const wrap = document.getElementById('product-scale-wrap');
    if (!wrap) return;
    const ro = new ResizeObserver(() => autoScaleProduct());
    ro.observe(wrap);
})();

init();
dcSetAstragalMode('through');  // initialise bars UI — dropdowns visible, defaulting to 0
dcUpdateFrameProfileBtn();     // initialise frame size button label

// Auto-scale after initial render
autoScaleProduct();


// ── Bubble communication infrastructure ──────────────────────
// These four functions are required for the product to work in Bubble.
// Without them: console stays empty, save times out, load does nothing.

// collectProductData — gathers all state for saving
function collectProductData() {
    const colXs = [...new Set(state.panes.map(p => p.x))].sort((a,b) => a-b);
    const rowYs = [...new Set(state.panes.map(p => p.y))].sort((a,b) => a-b);
    return {
        productType:  'pvc-casement',
        version:      '2.0',
        timestamp:    new Date().toISOString(),
        frame: {
            width:  Math.round(state.panes.reduce((max,p) => Math.max(max, p.x+p.w), 0) * SCALE_FACTOR + (getFramePx('left') + SASH_BORDER_PX + getFramePx('right') + SASH_BORDER_PX) * SCALE_FACTOR),
            height: Math.round(state.panes.reduce((max,p) => Math.max(max, p.y+p.h), 0) * SCALE_FACTOR + (getFramePx('top') + SASH_BORDER_PX + getFramePx('bottom') + SASH_BORDER_PX) * SCALE_FACTOR)
        },
        widthMm:      state.width_mm,
        heightMm:     state.height_mm,
        grid: {
            cols: colXs.length,
            rows: rowYs.length
        },
        panes:        state.panes,
        dividers:     state.dividers,
        frameProfile: state.frameProfile,
        sashProfile:  state.sashProfile,
        colourState:  colourState,
        jointState:   jointState,
        sashStyle:         sashStyle,
        equalGlass:        equalGlass,
        equalTransomGlass: equalTransomGlass,
        astragal:     astragal,
        cillHeight:   cillHeight,
        addonState:   addonState,
        trickleVents: trickleVents,
        lockedH:      lockedH,
        lockedV:      lockedV,
        glassState:      glassState,
        furnitureState:  furnitureState,
        otherState:      otherState,
        profileName:     savedProfileName,
        rangeName:       savedRangeName
    };
}

// loadProductData — restores saved state from Bubble JSON
function loadProductData(data) {
    if (!data) return;
    isLoadingProduct = true;
    try {
        if (data.widthMm)     { state.width_mm  = data.widthMm; }
        if (data.heightMm)    { state.height_mm = data.heightMm; }
        if (data.panes)       { state.panes    = data.panes; }
        if (data.dividers)    { state.dividers = data.dividers; }
        if (data.frameProfile){ state.frameProfile = data.frameProfile; }
        if (data.sashProfile) { state.sashProfile  = data.sashProfile; }
        if (data.colourState) { Object.assign(colourState, data.colourState); }
        if (data.jointState)  { Object.assign(jointState,  data.jointState); }
        if (data.sashStyle)   { sashStyle  = data.sashStyle; }
        if (data.equalGlass !== undefined)        { equalGlass        = data.equalGlass; }
        if (data.equalTransomGlass !== undefined)  { equalTransomGlass = data.equalTransomGlass; }
        if (data.astragal)    { Object.assign(astragal, data.astragal); }
        if (data.cillHeight !== undefined) { cillHeight = data.cillHeight; }
        if (data.addonState)  { Object.assign(addonState, data.addonState); }
        if (data.trickleVents){ Object.assign(trickleVents, data.trickleVents); }
        if (data.lockedH)     { Object.assign(lockedH, data.lockedH); }
        if (data.lockedV)     { Object.assign(lockedV, data.lockedV); }
        if (data.glassState)     { Object.assign(glassState, data.glassState); }
        if (data.furnitureState) { Object.assign(furnitureState, data.furnitureState); }
        if (data.otherState)     { Object.assign(otherState, data.otherState); }
        if (data.profileName !== undefined) savedProfileName = data.profileName;
        if (data.rangeName   !== undefined) savedRangeName   = data.rangeName;
        render();
        // After render, update CSS bevel variables and sash overlays to match saved colours.
        // We do NOT call applyExternalFrameColour as it triggers another render() internally.
        if (data.colourState) {
            const fHex   = colourState.externalFrame;
            const sHex   = colourState.externalSash;
            const frameEl = document.querySelector('.frame-outer');
            if (frameEl) frameEl.style.background = fHex;
            const cillEl  = el('cill');
            if (cillEl)  cillEl.style.background  = fHex;
            const fb = getBevelColours(fHex);
            document.documentElement.style.setProperty('--bevel-dark',  fb.dark);
            document.documentElement.style.setProperty('--bevel-light', fb.light);
            updateJointColour(fHex);
            applyExternalSashColour(sHex);
        }
        if (data.jointState) {
            applyFrameJoint(jointState.externalFrame);
            applySashJoint(jointState.externalSash);
        }
        setTimeout(() => {
            isLoadingProduct = false;
            casementSendInitialState();
            // Re-apply saved colours after console default colour may have overwritten them.
            // casementSendInitialState fires the round-trip that triggers applyDefaultColourForProduct.
            // We re-paint 300ms later to ensure the saved colour wins.
            if (data.colourState) {
                const fHex = colourState.externalFrame;
                const sHex = colourState.externalSash;
                setTimeout(() => {
                    const frameEl = document.querySelector('.frame-outer');
                    if (frameEl) frameEl.style.background = fHex;
                    const cillEl = el('cill');
                    if (cillEl) cillEl.style.background = fHex;
                    const fb = getBevelColours(fHex);
                    document.documentElement.style.setProperty('--bevel-dark',  fb.dark);
                    document.documentElement.style.setProperty('--bevel-light', fb.light);
                    updateJointColour(fHex);
                    applyExternalSashColour(sHex);
                    // All colours final — reveal the product
                    const pw = document.getElementById('product-wrapper');
                    if (pw) pw.style.visibility = 'visible';
                }, 300);
            }
        }, 1200);
        console.log('✅ Casement product data loaded');
    } catch(e) {
        console.error('Error loading casement product data:', e);
    }
}

// captureScreenshot — takes two screenshots (with and without measurements) and sends to save button
// Collapses 100vh containers before capture so html2canvas captures only the wrapper content
function captureScreenshot() {
    const wrapper = document.getElementById('product-wrapper');
    const scaleWrap = document.getElementById('product-scale-wrap');
    if (!wrapper || typeof html2canvas === 'undefined') {
        window.parent.postMessage({ source: 'product-display', command: 'screenshotError', error: 'html2canvas not available' }, '*');
        return;
    }

    // Elements to hide for the "without measurements" screenshot
    const measureEls = [
        document.getElementById('measurements-x'),
        document.getElementById('measurements-x-total'),
        document.getElementById('measurements-y'),
        document.getElementById('measurements-y-total')
    ].filter(Boolean);

    // Temporarily set inputs to fixed screenshot size — clear counter-scale transform too
    const allInputs = wrapper.querySelectorAll('.m-seg input, .mx-seg input, .my-total input, .mx-total input');
    allInputs.forEach(function(inp) {
        inp.style.transform  = 'none';
        inp.style.width      = '80px';
        inp.style.height     = '27px';
        inp.style.fontSize   = '20px';
        inp.style.lineHeight = '27px';
        inp.style.padding    = '4px';
        inp.style.textAlign  = 'center';
        inp.style.boxSizing  = 'border-box';
    });

    // Collapse 100vh containers so html2canvas captures wrapper content only, not full viewport
    const bodyPrevHeight = document.body.style.height;
    const scaleWrapPrevHeight = scaleWrap ? scaleWrap.style.height : '';
    document.body.style.height = 'auto';
    if (scaleWrap) scaleWrap.style.height = 'auto';

    function restoreInputs() {
        allInputs.forEach(function(inp) {
            inp.style.transform  = '';
            inp.style.width      = '';
            inp.style.height     = '';
            inp.style.fontSize   = '';
            inp.style.lineHeight = '';
            inp.style.padding    = '';
            inp.style.textAlign  = '';
            inp.style.boxSizing  = '';
        });
        measureEls.forEach(function(el) { el.style.visibility = ''; });
        // Restore heights
        document.body.style.height = bodyPrevHeight;
        if (scaleWrap) scaleWrap.style.height = scaleWrapPrevHeight;
        autoScaleProduct();
    }

    // Small delay to allow repaint before capture
    setTimeout(function() {
        // Both shots capture wrapper — same size guaranteed
        // WITH measurements
        html2canvas(wrapper, { backgroundColor: '#ffffff', scale: 2, logging: false })
            .then(function(canvas1) {
                const imgWith = canvas1.toDataURL('image/png');
                measureEls.forEach(function(el) { el.style.visibility = 'hidden'; });
                // WITHOUT measurements
                return html2canvas(wrapper, { backgroundColor: '#ffffff', scale: 2, logging: false })
                    .then(function(canvas2) {
                        const imgWithout = canvas2.toDataURL('image/png');
                        restoreInputs();
                        window.parent.postMessage({
                            source:  'product-display',
                            command: 'screenshotData',
                            data: { withMeasurements: imgWith, withoutMeasurements: imgWithout, cropped: imgWith }
                        }, '*');
                    });
            })
            .catch(function(err) {
                restoreInputs();
                window.parent.postMessage({ source: 'product-display', command: 'screenshotError', error: err.message }, '*');
            });
    }, 100);
}

// Send initial state to console on load — same pattern as all other products
setTimeout(function() { casementSendInitialState(); }, 100);
setTimeout(function() { casementSendInitialState(); }, 500);
setTimeout(function() { casementSendInitialState(); }, 1000);

// New product fallback — if loadProductData is never called (new product),
// reveal the product-wrapper after 1500ms so it doesn't stay hidden forever.
if (window.parent !== window) {
    setTimeout(function() {
        const pw = document.getElementById('product-wrapper');
        if (pw && pw.style.visibility === 'hidden') pw.style.visibility = 'visible';
    }, 1500);
}

// ── Embedded mode detection ───────────────────────────────────
// When running inside a parent frame (Bubble project), hide the built-in
// test console so only the window is visible and fills the full width.
// Also hide product-wrapper immediately to prevent the default init() render
// from flashing before the saved product loads. Revealed in loadProductData.
if (window.parent !== window) {
    const demoConsole = document.getElementById('demo-console');
    if (demoConsole) demoConsole.style.display = 'none';
    const scaleWrap = document.getElementById('product-scale-wrap');
    if (scaleWrap) scaleWrap.style.flex = '1';
    const productWrapper = document.getElementById('product-wrapper');
    if (productWrapper) productWrapper.style.visibility = 'hidden';
    autoScaleProduct();
}
</script>
