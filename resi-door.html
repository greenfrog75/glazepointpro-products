let svgEl  = null;
let pathEl = null;

function onCellMouseDown(e) {
    if (e.button !== 0) return;
    e.stopPropagation();
    drawing = true;
    suppressClick = false;
    const rect = innerEl.getBoundingClientRect();
    currentPath = [{ x: (e.clientX - rect.left) / currentAutoScale, y: (e.clientY - rect.top) / currentAutoScale }];

    // SVG sketch overlay on innerEl
    svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgEl.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:50;overflow:visible;';
    pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('fill', 'none');
    pathEl.setAttribute('stroke', 'rgba(255,255,255,0.9)');
    pathEl.setAttribute('stroke-width', '3');
    pathEl.setAttribute('stroke-linecap', 'round');
    svgEl.appendChild(pathEl);
    innerEl.appendChild(svgEl);
}

document.addEventListener('mousemove', function(e) {
    if (!drawing) return;
    const rect = innerEl.getBoundingClientRect();
    currentPath.push({ x: (e.clientX - rect.left) / currentAutoScale, y: (e.clientY - rect.top) / currentAutoScale });

    if (currentPath.length >= 2) {
        pathEl.setAttribute('d', 'M ' + currentPath.map(p => `${p.x} ${p.y}`).join(' L '));
    }
});

document.addEventListener('mouseup', function(e) {
    if (!drawing) return;
    drawing = false;
    if (svgEl) { svgEl.remove(); svgEl = null; pathEl = null; }

    if (currentPath.length < 2) return;

    const start = currentPath[0];
    const end   = currentPath[currentPath.length - 1];
    const dx    = Math.abs(end.x - start.x);
    const dy    = Math.abs(end.y - start.y);

    // Require a minimum drag distance to register
    if (dx < 5 && dy < 5) return;

    const isH    = dx >= dy;
    // MIDRAIL thickness rule: bar height = mm/SCALE_FACTOR exactly. Cell borders draw inward independently.
    const defaultMidrailPx = MIDRAIL_MM_DEFAULT / SCALE_FACTOR;
    const mullionPx = MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2;
    let splitPos = isH
        ? Math.round(currentPath.reduce((s,p) => s + p.y, 0) / currentPath.length - defaultMidrailPx / 2)
        : Math.round(currentPath.reduce((s,p) => s + p.x, 0) / currentPath.length - mullionPx / 2);

    // ── Snap to existing midrail ─────────────────────────────────
    // If drawing a horizontal bar (midrail) within 100mm of an existing midrail,
    // snap to the same pos so the ruler deduplicates them automatically.
    //
    // ALIGNED BARS PATTERN — applies throughout this file:
    // When two partial midrails share the same pos (because one snapped to the other),
    // they are independent divider objects but must behave as one visual unit.
    // Three places enforce this:
    //   1. onBarMouseDown/onMouseMove — aligned bars captured at drag start, moved together
    //   2. handleMeasurementInput    — aligned bars at same oldPos updated together
    //   3. setMidrailThickness       — aligned bars at same oldPos get same thickness
    // In all cases the check is: Math.abs(other.pos - referencePos) < 1
    if (isH) {
        const snapTolerancePx = 100 / SCALE_FACTOR;
        const renderHalfPx    = defaultMidrailPx / 2;
        const existingH = state.dividers.filter(d => d.type === 'h');
        for (const existing of existingH) {
            const existingCentre = existing.pos + renderHalfPx;
            const newCentre = splitPos + renderHalfPx;
            if (Math.abs(newCentre - existingCentre) <= snapTolerancePx) {
                // barTop = splitPos - renderHalfPx, so to get barTop = existing.pos:
                // splitPos = existing.pos + renderHalfPx
                splitPos = existing.pos + renderHalfPx;
                break;
            }
        }
    }

    // Find all panes the drag intersects and meets the 30% threshold
    const { innerW, innerH } = getInnerDims();
    const dragMinX = Math.min(start.x, end.x);
    const dragMaxX = Math.max(start.x, end.x);
    const dragMinY = Math.min(start.y, end.y);
    const dragMaxY = Math.max(start.y, end.y);

    const targets = state.panes.filter(p => {
        if (isH) {
            const barY = splitPos;
            if (barY <= p.y || barY >= p.y + p.h - defaultMidrailPx) return false;
            const overlapX = dragMaxX > p.x && dragMinX < p.x + p.w;
            const meetsThreshold = dx >= p.w * 0.3;
            return overlapX && meetsThreshold;
        } else {
            const barX = splitPos;
            if (barX <= p.x || barX >= p.x + p.w - mullionPx) return false;
            const overlapY = dragMaxY > p.y && dragMinY < p.y + p.h;
            const meetsThreshold = dy >= p.h * 0.3;
            return overlapY && meetsThreshold;
        }
    });

    if (targets.length === 0) { suppressClick = false; return; }
    suppressClick = true;
    setTimeout(() => { suppressClick = false; }, 50);

    // Work out the span of the new divider
    const spanMin = Math.min(...targets.map(p => isH ? p.x : p.y));
    const spanMax = Math.max(...targets.map(p => isH ? p.x + p.w : p.y + p.h));

    const newThicknessMm = isH ? MIDRAIL_MM_DEFAULT : MULLION_MM_DEFAULT;
    // thicknessPx = flat face only = mm/SCALE_FACTOR - 2×SASH_BORDER_PX (bevels are contributed by adjacent cell borders)
    const newThicknessPx = (newThicknessMm / SCALE_FACTOR) - SASH_BORDER_PX * 2;
    const newRenderH = isH ? MIDRAIL_MM_DEFAULT / SCALE_FACTOR : MULLION_MM_DEFAULT / SCALE_FACTOR;
    const barTop = isH ? Math.round(splitPos - newRenderH / 2) : splitPos;

    targets.forEach(p => {
        const idx = state.panes.indexOf(p);
        state.panes.splice(idx, 1);
        if (isH) {
            state.panes.push(
                { x: p.x, y: p.y,                          w: p.w, h: barTop - p.y },
                { x: p.x, y: barTop + newThicknessPx,       w: p.w, h: (p.y + p.h) - (barTop + newThicknessPx) }
            );
        } else {
            state.panes.push(
                { x: p.x,                          y: p.y, w: splitPos - p.x,                              h: p.h },
                { x: splitPos + newThicknessPx,    y: p.y, w: (p.x + p.w) - (splitPos + newThicknessPx),  h: p.h }
            );
        }
    });
    state.dividers.push({ type: isH ? 'h' : 'v', pos: barTop, start: spanMin, end: spanMax, thicknessMm: newThicknessMm, thicknessPx: newThicknessPx });

    // ── Default-to-600 widths ─────────────────────────────────────────────────
    // When a full-span vertical bar is added and width_mm is still at the expected
    // default (previous colCount × 600, or 1200 for the very first mullion),
    // resize total width to colCount × 600 using dcSetDimension (the correct
    // resize path — handles scalePanes/preScale properly per the build spec).
    // Then redistributeBars('v') spaces all mullions evenly.
    // applied600 skips the centre/thirds snaps which would fight this.
    let applied600 = false;
    if (!isH) {
        const { innerH: _innerH } = getInnerDims();
        const isFullSpanV = Math.abs(spanMin) < 1 && Math.abs(spanMax - _innerH) < 2;
        if (isFullSpanV) {
            const fullSpanMullions = state.dividers.filter(d =>
                d.type === 'v' && Math.abs(d.start) < 1 && Math.abs(d.end - _innerH) < 2
            );
            const colCount = fullSpanMullions.length + 1;
            const prevColCount = colCount - 1;
            const expectedPrevWidth = prevColCount <= 1 ? 1200 : prevColCount * 600;
            if (Math.abs(state.width_mm - expectedPrevWidth) < 10) {
                dcSetDimension('w', colCount * 600);
                redistributeBars('v');
                applied600 = true;
            }
        }
    }

    // Centre snap — if this is the first bar of its type (no existing midrails/mullions)
    // and it was drawn within 15% of the inner area centre, snap to true centre.
    // The new bar has already been pushed, so count === 1 means it's the first.
    const sameTypeBars = state.dividers.filter(d => d.type === (isH ? 'h' : 'v'));
    const { innerW: iW, innerH: iH } = getInnerDims();
    if (!applied600 && sameTypeBars.length === 1) {
        const centre    = isH ? iH / 2 : iW / 2;
        const threshold = (isH ? iH : iW) * 0.15;
        if (Math.abs(splitPos - centre) <= threshold) redistributeBars(isH ? 'h' : 'v');
    }

    // Equal thirds snap — if this is the second full-span vertical bar (mullion)
    // and the existing one is at absolute centre, redistribute to equal thirds.
    if (!applied600 && !isH && sameTypeBars.length === 2) {
        const fullSpanV = sameTypeBars.filter(d =>
            Math.abs(d.start) < 1 && Math.abs(d.end - iH) < 1
        );
        if (fullSpanV.length === 2) {
            const existingBar = fullSpanV.find(d => d !== state.dividers[state.dividers.length - 1]);
            if (existingBar) {
                const existingCentre = existingBar.pos + (existingBar.thicknessPx ?? (MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2)) / 2;
                const absoluteCentre = iW / 2;
                if (Math.abs(existingCentre - absoluteCentre) < 2) {
                    redistributeBars('v');
                }
            }
        }
    }

    // If in equal glass mode and new bar is full-span, redistribute that axis
    if (equalGlass) {
        const { innerW, innerH } = getInnerDims();
        const axis = isH ? 'h' : 'v';
        const isFullSpan = isH
            ? (Math.abs(spanMin) < 1 && Math.abs(spanMax - innerW) < 1)
            : (Math.abs(spanMin) < 1 && Math.abs(spanMax - innerH) < 1);
        if (isFullSpan) redistributeBars(axis);
    }

    render();
});

// ── Bar drag ──────────────────────────────────────────────────
function onBarMouseDown(e, divider) {
    e.preventDefault();
    e.stopPropagation();

    return; // drag disabled — resize via measurement inputs only
    // Block drag if this is a full-span bar and either adjacent segment is locked
    const { innerW, innerH } = getInnerDims();
    const isFullSpan = divider.type === 'h'
        ? (Math.abs(divider.start) < 1 && Math.abs(divider.end - innerW) < 1)
        : (Math.abs(divider.start) < 1 && Math.abs(divider.end - innerH) < 1);

    if (isFullSpan) {
        const locked = divider.type === 'h' ? lockedH : lockedV;
        // Find this bar's index among sorted full-span bars of same type
        const fullSpan = state.dividers
            .filter(d => d.type === divider.type &&
                (d.type === 'h'
                    ? Math.abs(d.start) < 1 && Math.abs(d.end - innerW) < 1
                    : Math.abs(d.start) < 1 && Math.abs(d.end - innerH) < 1))
            .sort((a,b) => a.pos - b.pos);
        const barIdx = fullSpan.indexOf(divider);
        // This bar borders segment barIdx (above/left) and barIdx+1 (below/right)
        if (locked[barIdx] || locked[barIdx + 1]) return;
    }

    const startMouse = divider.type === 'h' ? e.clientY : e.clientX;
    const startPos   = divider.pos;
    const BAR        = divider.thicknessPx ?? (divider.type === 'h' ? MIDRAIL_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2 : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2);
    const T          = 5; // tolerance px

    // Bar drag means bars are no longer equalised — clear console buttons immediately
    broadcastEqualiseState(false, false);
    broadcastTransomEqualiseState(false, false);

    // Capture aligned bars once at drag start
    const alignedBars = state.dividers.filter(other =>
        other !== divider &&
        other.type === divider.type &&
        Math.abs(other.pos - startPos) < 1
    );

    function onMouseMove(moveEvent) {
        const delta  = ((divider.type === 'h' ? moveEvent.clientY : moveEvent.clientX) - startMouse) / currentAutoScale;
        const oldPos = divider.pos;
        const newPos = startPos + delta;
        divider.pos  = newPos;

        // Move aligned bars (captured at drag start) together with the dragged bar
        alignedBars.forEach(other => {
            other.pos = newPos;
            const otherBAR = other.thicknessPx ?? (other.type === 'h' ? MIDRAIL_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2 : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2);
            syncDividerMove(other, oldPos, otherBAR);
        });

        // 1. Stretch/shrink connected perpendicular bar spans
        // 2. Global boundary sync — panes sit at pos+BAR (below/right) or end at pos (above/left)
        syncDividerMove(divider, oldPos, BAR);

        render();
    }

    function onMouseUp() {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup',   onMouseUp);
    }

    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
}

// ── Measurements ──────────────────────────────────────────────
function drawMeasurements(innerW, innerH) {
    const { fpTop, fpLeft } = getInnerDims();

    // Bar centre positions in MM — source of truth, no pixel rounding
    // 0mm = outer frame edge, totalMm = opposite outer frame edge
    // Use all unique h-divider positions regardless of span (partial midrails still define rows)
    const hMm = [...new Set(
        state.dividers
            .filter(d => d.type === 'h')
            .map(d => Math.round((fpTop + d.pos + (d.thicknessPx ?? MIDRAIL_FLAT_PX) / 2) * SCALE_FACTOR))
    )].sort((a,b) => a - b);

    const vMm = [...new Set(
        state.dividers
            .filter(d => d.type === 'v')
            .map(d => Math.round((fpLeft + d.pos + (d.thicknessPx ?? (MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2)) / 2) * SCALE_FACTOR))
    )].sort((a,b) => a - b);

    drawMeasurementAxis('y', hMm, state.height_mm - addonTotal('top') - addonTotal('bttm') - cillHeight, fpTop,  MIDRAIL_FLAT_PX);
    drawMeasurementAxis('x', vMm, state.width_mm  - addonTotal('left') - addonTotal('right'), fpLeft, fpLeft);
}

function drawMeasurementAxis(axis, barMmPos, totalMm, fp, barPx) {
    // barMmPos: bar centres in mm (0..totalMm). All values stay in mm — px only for layout.
    const isY      = axis === 'y';
    const locked   = isY ? lockedH : lockedV;
    const mmPts    = [0, ...barMmPos, totalMm];
    const segCount = mmPts.length - 1;
    const measEl   = el(isY ? 'measurements-y' : 'measurements-x');
    measEl.innerHTML = '';

    for (let i = 0; i < segCount; i++) {
        const segMm = mmPts[i+1] - mmPts[i];   // pure mm — no rounding
        const segPx = segMm / SCALE_FACTOR;     // px for layout only
        const seg   = document.createElement('div');
        if (isY) {
            seg.className    = 'm-seg' + (i === 0 ? ' first' : '');
            seg.style.height = segPx + 'px';
            const cap = document.createElement('span'); cap.className = 'm-cap'; seg.appendChild(cap);
        } else {
            seg.className    = 'mx-seg' + (i === 0 ? ' first' : '');
            seg.style.width  = segPx + 'px';
            seg.style.height = '35px';
            const cap = document.createElement('span'); cap.className = 'mx-cap'; seg.appendChild(cap);
        }
        const inp = document.createElement('input');
        inp.type  = 'text';
        inp.value = segMm;
        if (locked[i]) {
            inp.disabled         = true;
            inp.style.background = '#e0e0e0';
        }
        inp.addEventListener('change', function() {
            const newMm = parseInt(this.value) || segMm;
            // Lock triggers at 2+ segments (not 3) — a user with just 2 rows
            // should be able to lock row 1. The last segment is never lockable
            // because something must always absorb dimension changes.
            if (segCount >= 2) {
                locked[i] = true;
                this.disabled         = true;
                this.style.background = '#e0e0e0';
            }
            handleMeasurementInput(axis, i, newMm, barMmPos, totalMm, fp, barPx);
        });
        seg.appendChild(inp);
        measEl.appendChild(seg);
    }

    // Total input — y-axis shows frame+cill combined, bracket spans full height including cill
    const totalEl = el(isY ? 'measurements-y-total' : 'measurements-x-total');
    totalEl.innerHTML = '';
    const displayTotalMm = isY ? state.height_mm : state.width_mm;
    const totalPx = displayTotalMm / SCALE_FACTOR;
    const tot     = document.createElement('div');
    if (isY) {
        tot.className    = 'my-total';
        tot.style.height = totalPx + 'px';
        const cap2 = document.createElement('span'); cap2.className = 'my-cap'; tot.appendChild(cap2);
    } else {
        tot.className   = 'mx-total';
        tot.style.width = (state.width_mm / SCALE_FACTOR) + 'px';
        const capL = document.createElement('span'); capL.className = 'mx-cap-left';  tot.appendChild(capL);
        const capR = document.createElement('span'); capR.className = 'mx-cap-right'; tot.appendChild(capR);
    }
    const inp2 = document.createElement('input');
    inp2.type  = 'text';
    inp2.value = displayTotalMm;
    inp2.addEventListener('change', function() {
        const newMm = Math.max(100, parseInt(this.value) || displayTotalMm);
        const { innerW: oldInnerW, innerH: oldInnerH } = getInnerDims();
        if (isY) { state.height_mm = Math.max(100, newMm); } else { state.width_mm = newMm; }
        const { innerW: newInnerW, innerH: newInnerH } = getInnerDims();
        if (state.dividers.length > 0) {
            const scaleX = isY ? 1 : newInnerW / oldInnerW;
            const scaleY = isY ? newInnerH / oldInnerH : 1;
            const _preScale = state.dividers.map(d => ({ type: d.type, pos: d.pos, thicknessPx: d.thicknessPx ?? (d.type === 'h' ? MIDRAIL_FLAT_PX : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2) }));
            state.dividers.forEach(d => {
                if (d.type === 'h') {
                    d.pos   = Math.round(d.pos   * scaleY);
                    d.start = Math.round(d.start * scaleX);
                    d.end   = Math.round(d.end   * scaleX);
                } else {
                    d.pos   = Math.round(d.pos   * scaleX);
                    d.start = Math.round(d.start * scaleY);
                    d.end   = Math.round(d.end   * scaleY);
                }
            });
            scalePanes(scaleX, scaleY, _preScale);
            render();
        } else { init(); render(); }
    });
    tot.appendChild(inp2);
    totalEl.appendChild(tot);
}

function handleMeasurementInput(axis, changedIdx, newMm, barMmPos, totalMm, fp, barPx) {
    // Everything in mm. Pixels only appear when writing back to divider.pos at the end.
    const isY      = axis === 'y';
    const locked   = isY ? lockedH : lockedV;
    const mmPts    = [0, ...barMmPos, totalMm];
    const segCount = mmPts.length - 1;
    const currentMm = Array.from({ length: segCount }, (_,i) => mmPts[i+1] - mmPts[i]); // pure mm

    if (barMmPos.length === 0) {
        if (isY) { state.height_mm = Math.max(100, newMm); } else { state.width_mm = Math.max(100, newMm); }
        init(); return;
    }

    const clamped     = clamp(newMm, 100, totalMm - 100 * (segCount - 1));
    const newMmValues = currentMm.slice();
    newMmValues[changedIdx] = clamped;

    // Distribute remaining space among unlocked segments (excluding changedIdx)
    const others      = Array.from({ length: segCount }, (_,i) => i).filter(i => i !== changedIdx);
    const unlocked    = others.filter(i => !locked[i]);
    const lockedTotal = others.filter(i => locked[i]).reduce((s,i) => s + currentMm[i], 0);
    const remaining   = totalMm - clamped - lockedTotal;
    const unlockedTotal = unlocked.reduce((s,i) => s + currentMm[i], 0);
    if (unlocked.length > 0) {
        unlocked.forEach(i => {
            newMmValues[i] = Math.max(100, unlockedTotal > 0
                ? Math.round(remaining * currentMm[i] / unlockedTotal)
                : Math.round(remaining / unlocked.length));
        });
    }
    others.filter(i => locked[i]).forEach(i => { newMmValues[i] = currentMm[i]; });

    // Match each barMmPos entry to its actual divider by position (works for both full-span and partial)
    const divType = isY ? 'h' : 'v';
    const allDividersOfType = state.dividers
        .filter(d => d.type === divType)
        .sort((a,b) => a.pos - b.pos);

    // For each bar in barMmPos, find the divider whose centre matches (within 2px tolerance)
    function findDividerForBarMm(barCentreMm) {
        return allDividersOfType.find(d => {
            const halfPx = (d.thicknessPx ?? barPx) / 2;
            const centreMm = Math.round((fp + d.pos + halfPx) * SCALE_FACTOR);
            return Math.abs(centreMm - barCentreMm) <= 2;
        });
    }

    let cumMm = 0;
    const newBars = [];
    for (let i = 0; i < segCount - 1; i++) {
        cumMm += newMmValues[i];
        const div = findDividerForBarMm(barMmPos[i]);
        const halfPx = (div?.thicknessPx ?? barPx) / 2;
        newBars.push(cumMm / SCALE_FACTOR - fp - halfPx);
    }

    // Update the matched dividers by position
    // Also update any other bars of the same type that share the same pos (snapped bars)
    for (let i = 0; i < segCount - 1; i++) {
        const divider = findDividerForBarMm(barMmPos[i]);
        if (!divider || newBars[i] === undefined) continue;
        const oldPos = divider.pos;
        divider.pos  = newBars[i];
        const BAR    = divider.thicknessPx ?? (divider.type === 'h' ? MIDRAIL_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2 : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2);

        // Move any aligned bars that share the same oldPos
        state.dividers.forEach(other => {
            if (other === divider) return;
            if (other.type !== divider.type) return;
            if (Math.abs(other.pos - oldPos) < 1) {
                other.pos = newBars[i];
                const otherBAR = other.thicknessPx ?? BAR;
                syncDividerMove(other, oldPos, otherBAR);
            }
        });

        // Sync perpendicular bar spans and pane edges
        syncDividerMove(divider, oldPos, BAR);
    }

    render();
}

// ── Opener overlay ────────────────────────────────────────────
function getArrowSVG(direction, sw) {
    switch (direction) {
        case 'up':
            return `<line x1="0%" y1="100%" x2="50%" y2="0%" stroke="white" stroke-width="${sw}"/>` +
                   `<line x1="100%" y1="100%" x2="50%" y2="0%" stroke="white" stroke-width="${sw}"/>`;
        case 'down':
            return `<line x1="0%" y1="0%" x2="50%" y2="100%" stroke="white" stroke-width="${sw}"/>` +
                   `<line x1="100%" y1="0%" x2="50%" y2="100%" stroke="white" stroke-width="${sw}"/>`;
        case 'left':
            return `<line x1="100%" y1="0%" x2="0%" y2="50%" stroke="white" stroke-width="${sw}"/>` +
                   `<line x1="100%" y1="100%" x2="0%" y2="50%" stroke="white" stroke-width="${sw}"/>`;
        case 'right':
            return `<line x1="0%" y1="0%" x2="100%" y2="50%" stroke="white" stroke-width="${sw}"/>` +
                   `<line x1="0%" y1="100%" x2="100%" y2="50%" stroke="white" stroke-width="${sw}"/>`;
        default: return '';
    }
}

function setArrow(cellEl, directions) {
    const glass = cellEl.querySelector('.opener-glass');
    if (!glass) return;
    glass.querySelectorAll('.arrow-svg').forEach(s => s.remove());
    if (!directions || directions.length === 0) return;
    // Counter-scale stroke-width so arrows stay a consistent physical thickness at any zoom level
    const sw = (1.5 / currentAutoScale).toFixed(2);
    directions.forEach(direction => {
        if (!direction || direction === 'none') return;
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', '100%');
        svg.setAttribute('height', '100%');
        svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
        svg.classList.add('arrow-svg');
        svg.innerHTML = getArrowSVG(direction, sw);
        glass.appendChild(svg);
    });
}

function toggleOpener(cellEl) {
    const existing = cellEl.querySelector('.opener-overlay');
    if (existing) {
        existing.remove();
        const idx = Array.from(innerEl.querySelectorAll('.cell')).indexOf(cellEl);
        if (idx >= 0) { state.panes[idx].opener = false; state.panes[idx].direction = []; }
        return;
    }
    const idx = Array.from(innerEl.querySelectorAll('.cell')).indexOf(cellEl);
    if (idx >= 0) state.panes[idx].opener = true;
    const sashHex = colourState.externalSash;
    const { dark, light } = getBevelColours(sashHex);
    const jointCol = getJointColour(sashHex);
    const overlay = document.createElement('div');
    overlay.className = 'opener-overlay';
    // ─── OPEN SASH FRAME ───────────────────────────────────────────────────────
    // The overlay extends OVERLAP_PX outside the cell on all sides (the physical
    // lip that sits over the frame when the window is closed). This does NOT add
    // to the sash face width — it is purely the seal/overlap.
    //
    // SASH FACE WIDTH = 70mm (slim) or 75mm (standard) = getSashPx() total.
    // This includes:
    //   Outer bevel (SASH_BORDER_PX = 4px = 16mm)
    //   Flat face background  (getSashPx() - 2×SASH_BORDER_PX = 9.5px = 38mm)
    //   Inner bevel (SASH_BORDER_PX = 4px = 16mm)
    //   Total = 17.5px = 70mm ✓
    // ──────────────────────────────────────────────────────────────────────────
    overlay.style.cssText =
        `position:absolute;top:-${OVERLAP_PX}px;left:-${OVERLAP_PX}px;right:-${OVERLAP_PX}px;bottom:-${OVERLAP_PX}px;` +
        // ── Darren comment: This is the Open sash frame — background of .opener-overlay div ──
        `background:${sashHex};` +
        // ── Darren comment: Open sash outer bevel — border of .opener-overlay div
        // light = top + left (highlight), dark = bottom + right (shadow)
        // Uses getBevelColours(sashHex) — same logic as closed sash bevel (getBevelColours(frameHex)).
        // When frame and sash are the same colour, both bevels look identical.
        `border-top:${SASH_BORDER_PX}px solid ${light};border-left:${SASH_BORDER_PX}px solid ${light};` +
        `border-right:${SASH_BORDER_PX}px solid ${dark};border-bottom:${SASH_BORDER_PX}px solid ${dark};` +
        `box-shadow:0 0 5px rgba(0,0,0,1);` +
        `--sash-frame:${getSashPx()}px;box-sizing:border-box;z-index:200;pointer-events:none;`;
    const glass = document.createElement('div');
    glass.className = 'opener-glass';
    // ─── OPEN SASH GLASS ───────────────────────────────────────────────────────
    // The overlay extends OVERLAP_PX outside the cell on all sides.
    // The sash face width = getSashPx() = mm/SCALE_FACTOR (e.g. 17.5px for 70mm).
    // Of that, OVERLAP_PX (6.5px) sits outside the cell, so only
    // getSashPx() - OVERLAP_PX = 11px is consumed from inside the cell.
    // The glass should start at SASH_BORDER_PX (4px = inner bevel) inside the cell,
    // meaning the glass inset from the overlay outer edge =
    //   OVERLAP_PX + SASH_BORDER_PX = 6.5 + 4 = 10.5px
    // Which equals getSashPx() - SASH_BORDER_PX - SASH_GLASS_CORRECTION:
    //   17.5 - 4 - 3 = 10.5px ✓
    // SASH_GLASS_CORRECTION = getSashPx() - OVERLAP_PX - SASH_BORDER_PX * 2
    // If sash mm changes, getSashPx() changes and the inset updates automatically.
    // If OVERLAP_PX changes, update SASH_GLASS_CORRECTION accordingly.
    // ──────────────────────────────────────────────────────────────────────────
    const gi = getSashGlassInset();
    const glassBevelCol = sashStyle === 'sculptured' ? sashHex : dark;
    const glassBevelColLight = sashStyle === 'sculptured' ? sashHex : light;
    glass.style.cssText =
        `position:absolute;top:${gi}px;left:${gi}px;right:${gi}px;bottom:${gi}px;box-sizing:border-box;overflow:visible;` +
        // ── OPEN SASH GLASS — background of .opener-glass div (child of .opener-overlay) ─
        `background:transparent;` +
        // ── OPEN SASH GLASS BEVEL — border of .opener-glass div ─────────────────
        // dark = top + left (shadow), light = bottom + right (highlight)
        // On sculptured style glassBevelCol = sashHex (hidden under gs group overlays)
        `border-top:${SASH_BORDER_PX}px solid ${glassBevelCol};border-left:${SASH_BORDER_PX}px solid ${glassBevelCol};` +
        `border-right:${SASH_BORDER_PX}px solid ${glassBevelColLight};border-bottom:${SASH_BORDER_PX}px solid ${glassBevelColLight};`;
    // ── OPEN SASH GLASS COLOUR ───────────────────────────────────────────────
    // Set separately so it can be updated independently of the bevel (see updatePaneMaterial)
    const _colCount = new Set(state.panes.map(q => q.x)).size;
    const _rowCount = new Set(state.panes.map(q => q.y)).size;
    const _pane = idx >= 0 ? state.panes[idx] : null;
    const _isA1opener = _pane && _pane.x === 0 && _pane.y === 0 && _colCount >= 2 && _rowCount >= 2;
    glass.style.background = _isA1opener
        ? 'linear-gradient(135deg, #7a9ab8 0%, #2e3f52 35%, #0d1018 100%)'
        : 'linear-gradient(135deg, #3d5068 0%, #1e2a38 45%, #0a0c10 100%)';
    // 4 strips appended to the .opener-glass div, each 16mm wide.
    // Structure: 2mm outer line | 14mm gradient | 2mm inner line (sashHex).
    // Light from top-left: left/top use sDark, right/bottom use sLight.
    // Gradient runs transparent (outer) → solid (inner).
    // z-index: parent=215, gradient=216, lines=217.
    // ──────────────────────────────────────────────────────────────────────────
    if (sashStyle === 'sculptured') {
        const { dark: sDark, light: sLight } = getSculpturedBevelColours(sashHex);
        const gw = 16 / SCALE_FACTOR;  // 16mm parent width
        const ln = 2  / SCALE_FACTOR;  // 2mm line
        const gd = 14 / SCALE_FACTOR;  // 14mm gradient
        // gsLeft: outer line (left edge) | gradient → sDark | inner line (right edge)
        const gsLeft = document.createElement('div');
        gsLeft.style.cssText = `position:absolute;left:-${SASH_BORDER_PX}px;top:-${SASH_BORDER_PX}px;width:${gw}px;height:calc(100% + ${SASH_BORDER_PX*2}px);background:${sashHex};z-index:215;pointer-events:none;clip-path:polygon(0% 0%,100% ${gw}px,100% calc(100% - ${gw}px),0% 100%);`;
        const gsLeftOuterLine = document.createElement('div');
        gsLeftOuterLine.style.cssText = `position:absolute;left:0;top:0;width:${ln}px;height:100%;background:${sDark};z-index:217;pointer-events:none;`;
        gsLeft.appendChild(gsLeftOuterLine);
        const gsLeftGrad = document.createElement('div');
        gsLeftGrad.style.cssText = `position:absolute;left:${ln}px;top:0;width:${gd}px;height:100%;background:linear-gradient(to right,rgba(0,0,0,0),${sDark});z-index:216;pointer-events:none;`;
        gsLeft.appendChild(gsLeftGrad);
        const gsLeftInnerLine = document.createElement('div');
        gsLeftInnerLine.style.cssText = `position:absolute;right:0;top:0;width:${ln}px;height:100%;background:${sashHex};z-index:217;pointer-events:none;`;
        gsLeft.appendChild(gsLeftInnerLine);
        glass.appendChild(gsLeft);
        // gsTop: outer line (top edge) | gradient → sDark | inner line (bottom edge)
        const gsTop = document.createElement('div');
        gsTop.style.cssText = `position:absolute;top:-${SASH_BORDER_PX}px;left:-${SASH_BORDER_PX}px;width:calc(100% + ${SASH_BORDER_PX*2}px);height:${gw}px;background:${sashHex};z-index:215;pointer-events:none;clip-path:polygon(0% 0%,100% 0%,calc(100% - ${gw}px) 100%,${gw}px 100%);`;
        const gsTopOuterLine = document.createElement('div');
        gsTopOuterLine.style.cssText = `position:absolute;top:0;left:0;width:100%;height:${ln}px;background:${sDark};z-index:217;pointer-events:none;`;
        gsTop.appendChild(gsTopOuterLine);
        const gsTopGrad = document.createElement('div');
        gsTopGrad.style.cssText = `position:absolute;top:${ln}px;left:0;width:100%;height:${gd}px;background:linear-gradient(to bottom,rgba(0,0,0,0),${sDark});z-index:216;pointer-events:none;`;
        gsTop.appendChild(gsTopGrad);
        const gsTopInnerLine = document.createElement('div');
        gsTopInnerLine.style.cssText = `position:absolute;bottom:0;left:0;width:100%;height:${ln}px;background:${sashHex};z-index:217;pointer-events:none;`;
        gsTop.appendChild(gsTopInnerLine);
        glass.appendChild(gsTop);
        // gsRight: outer line (right edge) | gradient → sLight | inner line (left edge)
        const gsRight = document.createElement('div');
        gsRight.style.cssText = `position:absolute;right:-${SASH_BORDER_PX}px;top:-${SASH_BORDER_PX}px;width:${gw}px;height:calc(100% + ${SASH_BORDER_PX*2}px);background:${sashHex};z-index:215;pointer-events:none;clip-path:polygon(0% ${gw}px,100% 0%,100% 100%,0% calc(100% - ${gw}px));`;
        const gsRightOuterLine = document.createElement('div');
        gsRightOuterLine.style.cssText = `position:absolute;right:0;top:0;width:${ln}px;height:100%;background:${sLight};z-index:217;pointer-events:none;`;
        gsRight.appendChild(gsRightOuterLine);
        const gsRightGrad = document.createElement('div');
        gsRightGrad.style.cssText = `position:absolute;right:${ln}px;top:0;width:${gd}px;height:100%;background:linear-gradient(to left,rgba(0,0,0,0),${sLight});z-index:216;pointer-events:none;`;
        gsRight.appendChild(gsRightGrad);
        const gsRightInnerLine = document.createElement('div');
        gsRightInnerLine.style.cssText = `position:absolute;left:0;top:0;width:${ln}px;height:100%;background:${sashHex};z-index:217;pointer-events:none;`;
        gsRight.appendChild(gsRightInnerLine);
        glass.appendChild(gsRight);
        // gsBottom: outer line (bottom edge) | gradient → sLight | inner line (top edge)
        const gsBottom = document.createElement('div');
        gsBottom.style.cssText = `position:absolute;bottom:-${SASH_BORDER_PX}px;left:-${SASH_BORDER_PX}px;width:calc(100% + ${SASH_BORDER_PX*2}px);height:${gw}px;background:${sashHex};z-index:215;pointer-events:none;clip-path:polygon(${gw}px 0%,calc(100% - ${gw}px) 0%,100% 100%,0% 100%);`;
        const gsBottomOuterLine = document.createElement('div');
        gsBottomOuterLine.style.cssText = `position:absolute;bottom:0;left:0;width:100%;height:${ln}px;background:${sLight};z-index:217;pointer-events:none;`;
        gsBottom.appendChild(gsBottomOuterLine);
        const gsBottomGrad = document.createElement('div');
        gsBottomGrad.style.cssText = `position:absolute;bottom:${ln}px;left:0;width:100%;height:${gd}px;background:linear-gradient(to top,rgba(0,0,0,0),${sLight});z-index:216;pointer-events:none;`;
        gsBottom.appendChild(gsBottomGrad);
        const gsBottomInnerLine = document.createElement('div');
        gsBottomInnerLine.style.cssText = `position:absolute;top:0;left:0;width:100%;height:${ln}px;background:${sashHex};z-index:217;pointer-events:none;`;
        gsBottom.appendChild(gsBottomInnerLine);
        glass.appendChild(gsBottom);
    }
    overlay.appendChild(glass);
    // ─── OPEN SASH CORNER BOXES ────────────────────────────────────────────────
    // Corner boxes fill the 4 corners of the overlay not covered by the glass.
    // Their size must match SASH_GLASS_INSET so they align exactly with the glass edge.
    // If sash mm or OVERLAP_PX changes, SASH_GLASS_INSET updates both glass and corners.
    // ──────────────────────────────────────────────────────────────────────────
    const sashPx = getSashGlassInset();
    // Use per-pane cornerType if set, otherwise fall back to global jointState
    const paneCornerType = (idx >= 0 && state.panes[idx].cornerType) ? state.panes[idx].cornerType : jointState.externalSash;
    [
        { top:'0',    left:'0',  pos:'tl' },
        { top:'0',    right:'0', pos:'tr' },
        { bottom:'0', left:'0',  pos:'bl' },
        { bottom:'0', right:'0', pos:'br' }
    ].forEach(({ pos, ...cssPos }) => {
        const box = document.createElement('div');
        let css = `position:absolute;width:${sashPx}px;height:${sashPx}px;background:transparent;z-index:220;overflow:hidden;`;
        Object.entries(cssPos).forEach(([k,v]) => css += `${k}:${v};`);
        box.style.cssText = css;
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', sashPx);
        svg.setAttribute('height', sashPx);
        svg.style.cssText = 'position:absolute;left:0;top:0;pointer-events:none;';
        if (paneCornerType === 'welded') {
            getCornerPaths(pos, sashPx).forEach(d => addJointPath(svg, d, jointCol));
        } else {
            const sw    = getJointSW();
            const isLft = (pos === 'tl' || pos === 'bl');
            addJointRect(svg, 'v', isLft ? sashPx - sw - 1 : 0, sashPx, jointCol);
        }
        box.appendChild(svg);
        overlay.appendChild(box);
    });
    // ── OPEN SASH OUTER — sculptured bevel (os groups) ───────────────────────────
    // 4 strips appended to the .opener-overlay div, each 16mm wide.
    // Structure: 2mm outer line (osHex) | 14mm gradient | 2mm inner line.
    // Left/top: gradient sLight solid→transparent, inner line sLight.
    // Right/bottom: gradient sDark solid→transparent, inner line sDark.
    // clip-path on parent creates 45° mitre at corners.
    // Marked with class 'scul-overlay' so colour repaint can target them.
    // z-index: parent=210, gradient=211, lines=212.
    // ──────────────────────────────────────────────────────────────────────────
    // ──────────────────────────────────────────────────────────────────────────
    if (sashStyle === 'sculptured') {
        const osHex = colourState.externalSash;
        const { dark: sDark, light: sLight } = getSculpturedBevelColours(osHex);
        const b = SASH_BORDER_PX; // parent width = 16mm = SASH_BORDER_PX
        const ln = 2  / SCALE_FACTOR;  // 2mm line
        const gd = 14 / SCALE_FACTOR;  // 14mm gradient
        // osLeft: outer line (left edge) | gradient → sLight | inner line (right edge)
        const osLeft = document.createElement('div');
        osLeft.style.cssText = `position:absolute;left:-${SASH_BORDER_PX}px;top:-${SASH_BORDER_PX}px;width:${b}px;height:calc(100% + ${SASH_BORDER_PX*2}px);background:${osHex};z-index:210;pointer-events:none;clip-path:polygon(0% 0%,100% ${b}px,100% calc(100% - ${b}px),0% 100%);`;
        overlay.appendChild(osLeft); osLeft.classList.add("scul-overlay");
        const osLeftOuterLine = document.createElement('div');
        osLeftOuterLine.style.cssText = `position:absolute;left:0;top:0;width:${ln}px;height:100%;background:${osHex};z-index:212;pointer-events:none;`;
        osLeft.appendChild(osLeftOuterLine);
        const osLeftGrad = document.createElement('div');
        osLeftGrad.style.cssText = `position:absolute;left:${ln}px;top:0;width:${gd}px;height:100%;background:linear-gradient(to right,${sLight},rgba(0,0,0,0));z-index:211;pointer-events:none;`;
        osLeft.appendChild(osLeftGrad);

// ── Trickle vent popup ────────────────────────────────────────
function openTricklePopup() {
    closeTricklePopup();
    const overlay = document.createElement('div');
    overlay.className = 'cf-popup-overlay';
    document.body.appendChild(overlay);

    const popup = document.createElement('div');
    popup.className = 'cf-sash-popup cf-trickle-popup';
    popup.style.minWidth = '320px';

    const colXs   = [...new Set(state.panes.map(p => p.x))].sort((a,b) => a - b);
    const mullions = state.dividers.filter(d => d.type === 'v').sort((a,b) => a.pos - b.pos);

    // ── In Head cards ──────────────────────────────────────
    let headCards = '';
    colXs.forEach((x, i) => {
        const cur = trickleVents.inHead[i] || null;
        const letter = String.fromCharCode(65 + i);
        headCards += `
            <div class="tv-card">
                <div class="tv-card-label">Col ${letter}</div>
                <div class="tv-card-btns">
                    <button class="${cur === 'small' ? 'active' : ''}" onclick="toggleTrickleHead(${i},'small');rebuildTricklePopup();">Sm</button>
                    <button class="${cur === 'large' ? 'active' : ''}" onclick="toggleTrickleHead(${i},'large');rebuildTricklePopup();">Lg</button>
                </div>
            </div>`;
    });

    // ── Above Mullion cards ────────────────────────────────
    let mullionCards = '';
    mullions.forEach((d, i) => {
        const cur = trickleVents.aboveMullion[i] || null;
        const fromLetter = String.fromCharCode(65 + i);
        const toLetter   = String.fromCharCode(65 + i + 1);
        mullionCards += `
            <div class="tv-card">
                <div class="tv-card-label">${fromLetter}/${toLetter}</div>
                <div class="tv-card-btns">
                    <button class="${cur === 'small' ? 'active' : ''}" onclick="toggleTrickleMullion(${i},'small');rebuildTricklePopup();">Sm</button>
                    <button class="${cur === 'large' ? 'active' : ''}" onclick="toggleTrickleMullion(${i},'large');rebuildTricklePopup();">Lg</button>
                </div>
            </div>`;
    });

    const mullionSection = mullions.length > 0 ? `
        <p class="tv-section-title">Above Mullion</p>
        <div class="tv-cards">${mullionCards}</div>` : '';

    popup.innerHTML = `
        <button class="cf-popup-close">&times;</button>
        <h3>Trickle Vents</h3>
        <p class="tv-section-title">In Head</p>
        <div class="tv-cards">${headCards}</div>
        ${mullionSection}
        <div class="tv-popup-footer">
            <button class="cf-thickness-btn" onclick="clearTrickleHead();clearTrickleMullion();rebuildTricklePopup();">Clear All</button>
            <button class="cf-thickness-btn active" onclick="closeTricklePopup();">Done</button>
        </div>`;

    document.body.appendChild(popup);

    popup.querySelector('.cf-popup-close').addEventListener('click', closeTricklePopup);
    overlay.addEventListener('click', closeTricklePopup);
    popup.addEventListener('click', e => e.stopPropagation());
}

function rebuildTricklePopup() {
    // Re-render vents then rebuild popup in place
    renderTrickleVents();
    const existing = document.querySelector('.cf-sash-popup');
    if (existing) { closeTricklePopup(); openTricklePopup(); }
}

function closeTricklePopup() {
    document.querySelectorAll('.cf-trickle-popup,.cf-popup-overlay').forEach(e => e.remove());
}

// ── Per-pane visual helpers ───────────────────────────────────
function updatePaneToughened(cellEl, val) {
    if (!cellEl) return;
    cellEl.querySelectorAll('.pane-toughened-t').forEach(e => e.remove());
    if (!val) return;
    const t = document.createElement('div');
    t.className = 'pane-toughened-t';
    t.textContent = 'T';
    const hasOpener = !!cellEl.querySelector('.opener-overlay');
    const tTop  = hasOpener ? '26px' : '6px';
    const tLeft = hasOpener ? '27px' : '7px';
    t.style.cssText = `position:absolute;top:${tTop};left:${tLeft};font-size:26px;font-weight:600;color:rgba(255,255,255,0.85);pointer-events:none;z-index:300;user-select:none;line-height:1;`;
    cellEl.appendChild(t);
}

function updatePaneMaterial(cellEl, mat) {
    if (!cellEl) return;
    const glass = cellEl.querySelector('.opener-glass');
    if (glass) {
        if (mat === 'panel') {
            glass.style.background = colourState.externalSash;
            glass.style.backgroundImage = 'none';
        } else {
            glass.style.background = 'linear-gradient(135deg, #3d5068 0%, #1e2a38 45%, #0a0c10 100%)';
        }
    } else {
        // Fixed pane — target the cell background itself
        const existing = cellEl.querySelector('.pane-panel-overlay');
        if (existing) existing.remove();
        if (mat === 'panel') {
            const panel = document.createElement('div');
            panel.className = 'pane-panel-overlay';
            panel.style.cssText = `position:absolute;inset:0;background:${colourState.externalFrame};z-index:5;pointer-events:none;`;
            cellEl.appendChild(panel);
        }
    }
}

// ── Direction popup ───────────────────────────────────────────
let popupCell = null;

function openDirectionPopup(cellEl) {
    closeDirectionPopup();
    popupCell = cellEl;
    const overlay = document.createElement('div');
    overlay.className = 'cf-popup-overlay';
    document.body.appendChild(overlay);
    const popup = document.createElement('div');
    popup.className = 'cf-sash-popup';

    const dirs = ['left','up','right','down','none'];
    const icons = {
        left:  '<polyline points="15,6 9,12 15,18"></polyline>',
        up:    '<polyline points="6,15 12,9 18,15"></polyline>',
        right: '<polyline points="9,6 15,12 9,18"></polyline>',
        down:  '<polyline points="6,9 12,15 18,9"></polyline>',
        none:  '<rect x="8" y="8" width="8" height="8"></rect>'
    };

    // Derive pane ID and current state
    const idx       = parseInt(cellEl.dataset.paneIdx);
    const p         = state.panes[idx];
    const colXsAll  = [...new Set(state.panes.map(q => q.x))].sort((a,b) => a - b);
    const rowYsAll  = [...new Set(state.panes.map(q => q.y))].sort((a,b) => a - b);
    const colLetter = String.fromCharCode(65 + colXsAll.indexOf(p.x));
    const rowNumber = rowYsAll.indexOf(p.y) + 1;
    const paneId    = colLetter + rowNumber;
    const cur       = trickleVents.inSash[paneId] || null;

    const trickleBtns = `
        <div class="cf-thickness-options" id="dir-popup-trickle">
            <button class="cf-thickness-btn${cur === 'small' ? ' active' : ''}${!p.opener ? ' cf-btn-disabled' : ''}" data-trickle="small">Sm</button>
            <button class="cf-thickness-btn${cur === 'large' ? ' active' : ''}${!p.opener ? ' cf-btn-disabled' : ''}" data-trickle="large">Lg</button>
        </div>`;

    const isToughened  = !!p.toughened;
    const material     = p.material || 'glass';

    let dirBtns = dirs.map(d => {
        const currentDirs = p.direction || [];
        const isActive = d === 'none'
            ? (p.opener && currentDirs.length === 0)
            : currentDirs.includes(d);
        return `<button class="cf-direction-btn${isActive ? ' active' : ''}" data-dir="${d}"><svg viewBox="0 0 24 24">${icons[d]}</svg></button>`;
    }).join('');
    dirBtns += `<button class="cf-direction-btn" data-dir="clear"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;

    popup.innerHTML = `
        <button class="cf-popup-close">&times;</button>
        <h3>Sash ${paneId}</h3>
        <p class="tv-section-title">Open Direction</p>
        <div class="cf-popup-section"><div class="cf-direction-buttons">${dirBtns}</div></div>
        <p class="tv-section-title" style="margin-top:10px;">Trickle Vent</p>
        <div class="cf-popup-section" id="dp-trickle-section">${trickleBtns}</div>
        <p class="tv-section-title" style="margin-top:10px;">Toughened</p>
        <div class="cf-popup-section"><div class="cf-thickness-options">
            <button class="cf-thickness-btn${isToughened ? ' active' : ''}" id="dp-tough-yes">Yes</button>
            <button class="cf-thickness-btn" id="dp-tough-all">Apply to All</button>
            <button class="cf-thickness-btn${!isToughened ? ' active' : ''}" id="dp-tough-none">None</button>
        </div></div>
        <p class="tv-section-title" style="margin-top:10px;">Material</p>
        <div class="cf-popup-section"><div class="cf-thickness-options">
            <button class="cf-thickness-btn${material === 'glass' ? ' active' : ''}" data-material="glass">Glass</button>
            <button class="cf-thickness-btn${material === 'panel' ? ' active' : ''}" data-material="panel">Panel</button>
        </div></div>
        <div class="tv-popup-footer"><button class="cf-thickness-btn active" id="dir-popup-done">Done</button></div>`;

    document.body.appendChild(popup);

    // ── Direction buttons ──────────────────────────────────────
    popup.querySelectorAll('.cf-direction-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const dir = btn.getAttribute('data-dir');
            if (dir === 'clear') {
                const ov = popupCell.querySelector('.opener-overlay');
                if (ov) toggleOpener(popupCell);
                popup.querySelectorAll('.cf-direction-btn').forEach(b => b.classList.remove('active'));
                hideCornerSection();
            } else if (dir === 'none') {
                if (!popupCell.querySelector('.opener-overlay')) toggleOpener(popupCell);
                const isActive = btn.classList.contains('active');
                if (isActive) {
                    // toggle off — remove opener entirely
                    const ov = popupCell.querySelector('.opener-overlay');
                    if (ov) toggleOpener(popupCell);
                    btn.classList.remove('active');
                    hideCornerSection();
                } else {
                    state.panes[idx].direction = [];
                    setArrow(popupCell, []);
                    popup.querySelectorAll('.cf-direction-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showCornerSection();
                }
            } else {
                if (!popupCell.querySelector('.opener-overlay')) toggleOpener(popupCell);
                const dirs = state.panes[idx].direction || [];
                const i = dirs.indexOf(dir);
                if (i >= 0) dirs.splice(i, 1); else dirs.push(dir);
                state.panes[idx].direction = dirs;
                setArrow(popupCell, dirs);
                btn.classList.toggle('active', dirs.includes(dir));
                if (dirs.length > 0) { showCornerSection(); } else { hideCornerSection(); }
            }
        });
    });

    // ── Trickle buttons ───────────────────────────────────────
    popup.querySelectorAll('[data-trickle]').forEach(btn => {
        btn.addEventListener('click', () => {
            const size = btn.getAttribute('data-trickle');
            if (trickleVents.inSash[paneId] === size) {
                delete trickleVents.inSash[paneId];
            } else {
                trickleVents.inSash[paneId] = size;
            }
            renderTrickleVents();
            popup.querySelectorAll('[data-trickle]').forEach(b => {
                b.classList.toggle('active', trickleVents.inSash[paneId] === b.getAttribute('data-trickle'));
            });
        });
    });

    // ── Toughened buttons ─────────────────────────────────────
    function applyToughened(paneIdx, val) {
        state.panes[paneIdx].toughened = val;
        updatePaneToughened(Array.from(innerEl.querySelectorAll('.cell'))[paneIdx], val);
    }
    popup.querySelector('#dp-tough-yes').addEventListener('click', () => {
        applyToughened(idx, true);
        popup.querySelector('#dp-tough-yes').classList.add('active');
        popup.querySelector('#dp-tough-none').classList.remove('active');
    });
    popup.querySelector('#dp-tough-none').addEventListener('click', () => {
        applyToughened(idx, false);
        popup.querySelector('#dp-tough-yes').classList.remove('active');
        popup.querySelector('#dp-tough-none').classList.add('active');
    });
    popup.querySelector('#dp-tough-all').addEventListener('click', () => {
        state.panes.forEach((_, i) => {
            state.panes[i].toughened = true;
            updatePaneToughened(Array.from(innerEl.querySelectorAll('.cell'))[i], true);
        });
        popup.querySelector('#dp-tough-yes').classList.remove('active');
        popup.querySelector('#dp-tough-none').classList.remove('active');
        popup.querySelector('#dp-tough-all').classList.add('active');
    });

    function showCornerSection() {
        popup.querySelectorAll('[data-trickle]').forEach(b => b.classList.remove('cf-btn-disabled'));
    }
    function hideCornerSection() {
        popup.querySelectorAll('[data-trickle]').forEach(b => b.classList.add('cf-btn-disabled'));
    }

    // ── Material buttons ──────────────────────────────────────
    popup.querySelectorAll('[data-material]').forEach(btn => {
        btn.addEventListener('click', () => {
            const mat = btn.getAttribute('data-material');
            state.panes[idx].material = mat;
            updatePaneMaterial(popupCell, mat);
            popup.querySelectorAll('[data-material]').forEach(b => b.classList.toggle('active', b === btn));
        });
    });

    // ── Corner type buttons ───────────────────────────────────
    popup.querySelectorAll('[data-corner]').forEach(btn => {
        btn.addEventListener('click', () => {
            const ct = btn.getAttribute('data-corner');
            state.panes[idx].cornerType = ct;
            render();
            popup.querySelectorAll('[data-corner]').forEach(b => b.classList.toggle('active', b === btn));
        });
    });

    popup.querySelector('.cf-popup-close').addEventListener('click', closeDirectionPopup);
    popup.querySelector('#dir-popup-done').addEventListener('click', closeDirectionPopup);
    overlay.addEventListener('click', closeDirectionPopup);
    popup.addEventListener('click', e => e.stopPropagation());
}

function setMullionThickness(divider, newMm) {
    const oldThicknessPx = divider.thicknessPx ?? (MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2);
    // thicknessPx = flat face only = mm/SCALE_FACTOR - 2×SASH_BORDER_PX
    const newThicknessPx = newMm / SCALE_FACTOR - SASH_BORDER_PX * 2;

    // Centre stays fixed — grow symmetrically
    const centre = divider.pos + oldThicknessPx / 2;
    const newPos = centre - newThicknessPx / 2;

    const oldPos = divider.pos;
    divider.pos         = newPos;
    divider.thicknessMm = newMm;
    divider.thicknessPx = newThicknessPx;

    const T = 5;

    // Sync perpendicular bar spans
    state.dividers.forEach(other => {
        if (other === divider) return;
        if (other.type === 'h') {
            if (Math.abs(other.start - (oldPos + oldThicknessPx)) < T) other.start = divider.pos + newThicknessPx;
            if (Math.abs(other.end   -  oldPos)                   < T) other.end   = divider.pos;
        }
    });

    // Sync pane edges
    state.panes.forEach(pane => {
        if (Math.abs(pane.x - (oldPos + oldThicknessPx)) < T) {
            pane.w += pane.x - (divider.pos + newThicknessPx);
            pane.x  = divider.pos + newThicknessPx;
        }
        if (Math.abs((pane.x + pane.w) - oldPos) < T) {
            pane.w = divider.pos - pane.x;
        }
    });

    render();
}

function setMidrailThickness(divider, newMm) {
    const oldThicknessPx = divider.thicknessPx ?? MIDRAIL_FLAT_PX;
    // thicknessPx = flat face only = mm/SCALE_FACTOR - 2×SASH_BORDER_PX (bevels contributed by adjacent cell borders)
    const newThicknessPx = newMm / SCALE_FACTOR - SASH_BORDER_PX * 2;

    // Centre stays fixed — grow symmetrically
    const centre = divider.pos + oldThicknessPx / 2;
    const newPos = centre - newThicknessPx / 2;

    const oldPos = divider.pos;
    divider.pos         = newPos;
    divider.thicknessMm = newMm;
    divider.thicknessPx = newThicknessPx;

    const T = 5;

    // Sync perpendicular bar spans
    state.dividers.forEach(other => {
        if (other === divider) return;
        if (other.type === 'v') {
            if (Math.abs(other.start - (oldPos + oldThicknessPx)) < T) other.start = divider.pos + newThicknessPx;
            if (Math.abs(other.end   -  oldPos)                   < T) other.end   = divider.pos;
        }
    });

    // Sync pane edges — pane above shrinks/grows, pane below shrinks/grows
    state.panes.forEach(pane => {
        if (Math.abs(pane.y - (oldPos + oldThicknessPx)) < T) {
            pane.h += pane.y - (divider.pos + newThicknessPx);
            pane.y  = divider.pos + newThicknessPx;
        }
        if (Math.abs((pane.y + pane.h) - oldPos) < T) {
            pane.h = divider.pos - pane.y;
        }
    });

    // Apply same thickness to any aligned bars at the same oldPos
    state.dividers.forEach(other => {
        if (other === divider) return;
        if (other.type !== 'h') return;
        if (Math.abs(other.pos - oldPos) < 1) {
            other.pos         = newPos;
            other.thicknessMm = newMm;
            other.thicknessPx = newThicknessPx;
        }
    });

    render();
}

// ── scalePanes ───────────────────────────────────────────────
// Scales all pane positions and sizes by scaleX/scaleY.
// For panes adjacent to mullions (vertical dividers), x positions are snapped
// to the scaled mullion edges rather than scaled independently — this prevents
// a gap opening between the mullion overlay and the pane when the frame is resized.
function scalePanes(scaleX, scaleY, preScaleDividers) {
    const T = 2; // snap tolerance px
    state.panes.forEach(p => {
        // ── X axis (mullion-aware) ──
        // Use preScaleDividers (positions before scaling) to match against pane edges
        // (which are also still at pre-scale values at this point)
        if (scaleX !== 1) {
            const mullionLeft = preScaleDividers.find(d =>
                d.type === 'v' && Math.abs((d.pos + d.thicknessPx) - p.x) < T
            );
            const mullionRight = preScaleDividers.find(d =>
                d.type === 'v' && Math.abs(d.pos - (p.x + p.w)) < T
            );

            if (mullionLeft) {
                const newX = Math.round(mullionLeft.pos * scaleX + mullionLeft.thicknessPx);
                const newRight = mullionRight
                    ? Math.round(mullionRight.pos * scaleX)
                    : Math.round((p.x + p.w) * scaleX);
                p.x = newX;
                p.w = newRight - newX;
            } else if (mullionRight) {
                p.w = Math.round(mullionRight.pos * scaleX) - Math.round(p.x * scaleX);
                p.x = Math.round(p.x * scaleX);
            } else {
                p.x = Math.round(p.x * scaleX);
                p.w = Math.round(p.w * scaleX);
            }
        }

        // ── Y axis (midrail-aware) ──
        if (scaleY !== 1) {
            const midrailTop = preScaleDividers.find(d =>
                d.type === 'h' && Math.abs((d.pos + d.thicknessPx) - p.y) < T
            );
            const midrailBottom = preScaleDividers.find(d =>
                d.type === 'h' && Math.abs(d.pos - (p.y + p.h)) < T
            );

            if (midrailTop) {
                const newY = Math.round(midrailTop.pos * scaleY + midrailTop.thicknessPx);
                const newBottom = midrailBottom
                    ? Math.round(midrailBottom.pos * scaleY)
                    : Math.round((p.y + p.h) * scaleY);
                p.y = newY;
                p.h = newBottom - newY;
            } else if (midrailBottom) {
                p.h = Math.round(midrailBottom.pos * scaleY) - Math.round(p.y * scaleY);
                p.y = Math.round(p.y * scaleY);
            } else {
                p.y = Math.round(p.y * scaleY);
                p.h = Math.round(p.h * scaleY);
            }
        }
    });
}

function dcSetDimension(axis, val) {
    const mm = Math.max(300, Math.min(3000, parseInt(val) || 1200));
    const { innerW: oldInnerW, innerH: oldInnerH } = getInnerDims();
    if (axis === 'w') state.width_mm  = mm;
    else              state.height_mm = mm;
    const { innerW: newInnerW, innerH: newInnerH } = getInnerDims();
    if (state.dividers.length > 0) {
        const scaleX = axis === 'w' ? newInnerW / oldInnerW : 1;
        const scaleY = axis === 'h' ? newInnerH / oldInnerH : 1;
        const _preScale = state.dividers.map(d => ({ type: d.type, pos: d.pos, thicknessPx: d.thicknessPx ?? (d.type === 'h' ? MIDRAIL_FLAT_PX : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2) }));
        state.dividers.forEach(d => {
            if (d.type === 'h') { d.pos = d.pos * scaleY; d.start = d.start * scaleX; d.end = d.end * scaleX; }
            else                { d.pos = d.pos * scaleX; d.start = d.start * scaleY; d.end = d.end * scaleY; }
        });
        scalePanes(scaleX, scaleY, _preScale);
        scaleAstragalPositions(scaleX, scaleY);
        render();
    } else { init(); render(); }
}

function dcClearAllTrickle() {
    trickleVents.inHead      = {};
    trickleVents.aboveMullion = {};
    trickleVents.addonTop    = null;
    const smBtn = el('addon-trickle-sm'); if (smBtn) smBtn.classList.remove('active');
    const lgBtn = el('addon-trickle-lg'); if (lgBtn) lgBtn.classList.remove('active');
    dcRebuildTrickleCards();
    renderTrickleVents();
}

function dcRebuildTrickleCards() {
    // In Head cards
    const headContainer = el('dc-trickle-inhead-cards');
    if (!headContainer) return;
    headContainer.innerHTML = '';
    const topPanes = state.panes.filter(p => p.y === 0);
    const colXs    = [...new Set(topPanes.map(p => p.x))].sort((a,b) => a - b);
    colXs.forEach((x, i) => {
        const cur  = trickleVents.inHead[i] || null;
        const card = document.createElement('div');
        card.className = 'dc-vent-card';
        card.innerHTML = `<div class="dc-vent-card-label">Col ${String.fromCharCode(65+i)}</div>
            <div class="dc-vent-card-btns">
                <button class="${cur === 'small' ? 'active' : ''}" onclick="dcToggleTrickleHead(${i},'small')">Sm</button>
                <button class="${cur === 'large' ? 'active' : ''}" onclick="dcToggleTrickleHead(${i},'large')">Lg</button>
            </div>`;
        headContainer.appendChild(card);
    });

    // Above Mullion cards
    const mullions = state.dividers.filter(d => d.type === 'v').sort((a,b) => a.pos - b.pos);
    const mulSection = el('dc-trickle-mullion-section');
    const mulContainer = el('dc-trickle-mullion-cards');
    if (mulSection && mulContainer) {
        mulSection.style.display = mullions.length > 0 ? '' : 'none';
        mulContainer.innerHTML = '';
        mullions.forEach((d, i) => {
            const cur  = trickleVents.aboveMullion[i] || null;
            const card = document.createElement('div');
            card.className = 'dc-vent-card';
            card.innerHTML = `<div class="dc-vent-card-label">M${i+1}</div>
                <div class="dc-vent-card-btns">
                    <button class="${cur === 'small' ? 'active' : ''}" onclick="dcToggleTrickleMullion(${i},'small')">Sm</button>
                    <button class="${cur === 'large' ? 'active' : ''}" onclick="dcToggleTrickleMullion(${i},'large')">Lg</button>
                </div>`;
            mulContainer.appendChild(card);
        });
    }

    // Addon top button states
    const smBtn = el('addon-trickle-sm'); if (smBtn) smBtn.classList.toggle('active', trickleVents.addonTop === 'small');
    const lgBtn = el('addon-trickle-lg'); if (lgBtn) lgBtn.classList.toggle('active', trickleVents.addonTop === 'large');
}

function dcToggleTrickleHead(colIdx, size) {
    trickleVents.inHead[colIdx] = (trickleVents.inHead[colIdx] === size) ? undefined : size;
    if (!trickleVents.inHead[colIdx]) delete trickleVents.inHead[colIdx];
    dcRebuildTrickleCards();
    renderTrickleVents();
}

function dcToggleTrickleMullion(idx, size) {
    trickleVents.aboveMullion[idx] = (trickleVents.aboveMullion[idx] === size) ? undefined : size;
    if (!trickleVents.aboveMullion[idx]) delete trickleVents.aboveMullion[idx];
    dcRebuildTrickleCards();
    renderTrickleVents();
}

function dcSelectPane(cellEl) {
    const idx = parseInt(cellEl.dataset.paneIdx);
    const p   = state.panes[idx];
    const wMm = Math.round(p.w * SCALE_FACTOR);
    const hMm = Math.round(p.h * SCALE_FACTOR);
    const colXs     = [...new Set(state.panes.map(p => p.x))].sort((a,b) => a - b);
    const rowYs     = [...new Set(state.panes.map(p => p.y))].sort((a,b) => a - b);
    const colLetter = String.fromCharCode(65 + colXs.indexOf(p.x));
    const rowNumber = rowYs.indexOf(p.y) + 1;
    selectedPaneId  = colLetter + rowNumber;
    const dcEl = el('dc-selected-pane');
    if (dcEl) dcEl.innerHTML = `Selected pane: <strong>${selectedPaneId}</strong><span id="dc-pane-size">${wMm} × ${hMm} mm</span>`;
    dcUpdateAstragalUI();
    // Notify console of selected pane and its astragal counts
    const data = astragal.perSash[idx] || { hCount: 0, vCount: 0 };
    const msg = {
        source:  'product-display',
        command: 'paneSelected',
        data: {
            paneId: selectedPaneId,
            hCount: data.hCount || 0,
            vCount: data.vCount || 0,
            mode:   astragal.mode
        }
    };
    window.postMessage(msg, '*');
    try { window.parent.postMessage(msg, '*'); } catch(e) {}
}

function dcSetFrameProfile(side, key) {
    const { innerW: oldInnerW, innerH: oldInnerH } = getInnerDims();
    state.frameProfile[side] = key;
    dcUpdateFrameProfileBtn();
    const { innerW: newInnerW, innerH: newInnerH } = getInnerDims();
    if (state.dividers.length > 0 || state.panes.length > 1) {
        const scaleX = oldInnerW > 0 ? newInnerW / oldInnerW : 1;
        const scaleY = oldInnerH > 0 ? newInnerH / oldInnerH : 1;
        const _preScale = state.dividers.map(d => ({ type: d.type, pos: d.pos, thicknessPx: d.thicknessPx ?? (d.type === 'h' ? MIDRAIL_FLAT_PX : MULLION_MM_DEFAULT / SCALE_FACTOR - SASH_BORDER_PX * 2) }));
        state.dividers.forEach(d => {
            if (d.type === 'h') { d.pos = Math.round(d.pos * scaleY); d.start = Math.round(d.start * scaleX); d.end = Math.round(d.end * scaleX); }
            else                { d.pos = Math.round(d.pos * scaleX); d.start = Math.round(d.start * scaleY); d.end = Math.round(d.end * scaleY); }
        });
        scalePanes(scaleX, scaleY, _preScale);
        render();
    } else {
        init();
    }
}
